name: Base environment setup
runs:
  using: composite
  steps:
    - name: Set up Miniconda (with mamba)
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: "3.10"
        activate-environment: ml
        channels: conda-forge
        channel-priority: strict
        miniforge-version: latest
        use-mamba: true

    - name: Install RDKit (conda) + pip
      shell: bash -l {0}
      run: |
        mamba install -y python=3.10 rdkit pip

    - name: Install project dependencies
      shell: bash -l {0}
      run: |
        python -m pip install --upgrade pip setuptools wheel "numpy<2"
        # PyTorch CPU for GitHub-hosted runners
        pip install "torch==2.2.1" --index-url https://download.pytorch.org/whl/cpu
        # PyG compiled wheels (match torch 2.2.1 CPU)
        pip install torch-scatter torch-sparse torch-cluster torch-spline-conv -f https://data.pyg.org/whl/torch-2.2.1+cpu.html
        pip install "torch-scatter==2.1.2" -f https://data.pyg.org/whl/torch-2.2.1+cpu.html
        pip install torch-geometric
        # project’s requirements last
        pip install -r requirements.txt  
        
    # quick sanity print so logs prove the env is active
    - name: Show env
      shell: bash -l {0}
      run: |
        which python
        python -V
        python -c "import torch, rdkit; print('torch', torch.__version__); print('rdkit', rdkit.__version__)"


