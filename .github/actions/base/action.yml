name: Base environment setup
runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare PATH
      run: echo "PATH=/venv/main/bin:$PATH" >> $GITHUB_ENV

    - name: Install PyTorch if missing
      run: |
        python - <<'PY'
        try:
          import torch; print("torch:", torch.__version__)
        except Exception:
          import os; os.system("pip install --index-url https://download.pytorch.org/whl/cu121 torch torchvision torchaudio")
        PY

    - name: Set up Miniconda (with mamba)
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: "3.10"
        activate-environment: ml
        channels: conda-forge
        miniforge-version: latest
        use-mamba: true

    - name: Install RDKit (conda) + pip
      shell: bash -l {0}
      run: |
        mamba install -y python=3.10 rdkit pip

    - name: Install project dependencies
      shell: bash -l {0}
      run: |
        python -m pip install --upgrade pip setuptools wheel "numpy<2"
        pip install "torch==2.2.1" --index-url https://download.pytorch.org/whl/cpu
        pip install "torch-scatter==2.1.2" -f https://data.pyg.org/whl/torch-2.2.1+cpu.html
        pip install torch-geometric
        pip install -r requirements.txt

