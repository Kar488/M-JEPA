name: Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      # Python 3.11 + conda-forge (for rdkit)
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          channels: conda-forge
          activate-environment: test 
    
          
      - name: Install mamba into base
        shell: bash -l {0}
        run: conda install -n base -y -c conda-forge mamba

      - name: Install RDKit (conda) + Python deps
        shell: bash -l {0}
        run: |
          mamba install -y -c conda-forge rdkit
          python -m pip install --upgrade pip wheel setuptools
          # torch (CPU) then torch-scatter (CPU) with matching wheel
          pip install torch==2.2.1 --index-url https://download.pytorch.org/whl/cpu
          pip install torch-scatter==2.1.2 -f https://data.pyg.org/whl/torch-2.2.1+cpu.html
          pip install wandb
          # rest of deps (requirements.txt must NOT include rdkit/rdkit-pypi)
          pip install -r requirements.txt

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest -q
