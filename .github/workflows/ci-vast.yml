# .github/workflows/ci-vast.yml
name: CI → Vast GPU

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: {}

concurrency:
  group: vast-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /srv/mjepa
  VENV_DIR: /srv/mjepa/.venv
  PIP_CACHE_DIR: /srv/mjepa/.cache/pip

jobs:
  vast_smoke3:
    name: Smoke on Vast (GPU present?)
    runs-on: ubuntu-latest
    steps:
    # PRE-FLIGHT: prove the key+secrets work from the GitHub runner
    - name: SSH preflight (fingerprint only, passphrase key)
      run: |
        set -euxo pipefail
        umask 077
        printf '%s\n' "${{ secrets.VAST_SSH_KEY }}" > /tmp/vast_key
        chmod 600 /tmp/vast_key
        echo "Runner sees private-key fingerprint:"
        ssh-keygen -y -P "${{ secrets.VAST_SSH_PASSPHRASE }}" -f /tmp/vast_key | ssh-keygen -lf -  

    - name: SSH preflight (whoami with passphrase key)
      env:
        VAST_SSH_PASSPHRASE: 2hJxySm9!
      run: |
        set -euxo pipefail
        umask 077
        printf '%s\n' "${{ secrets.VAST_SSH_KEY }}" > /tmp/vast_key
        chmod 600 /tmp/vast_key

        # Start agent
        eval "$(ssh-agent -s)"

        # Provide passphrase via askpass
        cat > /tmp/askpass.sh <<'SH'
        #!/usr/bin/env bash
        printf '%s' "$VAST_SSH_PASSPHRASE"
        SH
            chmod +x /tmp/askpass.sh
            export SSH_ASKPASS=/tmp/askpass.sh
            export SSH_ASKPASS_REQUIRE=force

        # Add the key to the agent (must be detached from TTY)
        setsid -w ssh-add /tmp/vast_key < /dev/null

        # Now the agent holds the key; do the whoami test
        ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            -p "40129" \
            root@167.179.138.57 \
            whoami

    - name: GPU sanity
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VAST_HOST }}
        username: ${{ secrets.VAST_USER }}
        port: ${{ secrets.VAST_PORT }}
        key: ${{ secrets.VAST_SSH_KEY }}
        passphrase: 2hJxySm9!   # only include if your key is encrypted
        script: |
          set -euo pipefail
          whoami
          nvidia-smi
          python3 - <<'PY' || true
          import importlib, sys
          m = importlib.util.find_spec("torch")
          print("torch installed?", bool(m))
          if not m:
              sys.exit(0)
          import torch
          print("torch:", torch.__version__)
          print("cuda available:", torch.cuda.is_available())
          if torch.cuda.is_available():
              print("device 0:", torch.cuda.get_device_name(0))
          PY

  tests_quick:
    name: Quick tests (no gpu, no slow)
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps: 
      - uses: actions/checkout@v4
        # if you use submodules, add:
        # with:
        #   submodules: recursive
        #   fetch-depth: 0

      - name: Set up Miniconda (with mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.10"
          activate-environment: ml
          channels: conda-forge
          channel-priority: strict
          miniforge-version: latest
          use-mamba: true

      - name: Install RDKit + DeepChem (conda-forge)
        shell: bash -l {0}
        run: |
            mamba create -y -n mjepa -c conda-forge python=3.10 rdkit=2023.09.5 scipy=1.10.1 pip
      
      - name: Install DeepChem (pip, no deps)
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python -m pip install deepchem==2.8.0
          
      - name: Set versions (for cache key)
        run: |
          echo "PY_VER=3.10" >> $GITHUB_ENV
          echo "TORCH_VER=2.2.1" >> $GITHUB_ENV
          echo "TSCATTER_VER=2.1.2" >> $GITHUB_ENV

      - name: Define cache dirs
        run: echo "PIP_CACHE=${GITHUB_WORKSPACE}/.pip-cache" >> $GITHUB_ENV

      - name: Prepare pip cache dir
        run: mkdir -p "$PIP_CACHE"
                            
      - name: Cache pip (CI)
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE }} # <-- use the same dir we created
          key: pip-${{ runner.os }}-py${{ env.PY_VER }}-torch${{ env.TORCH_VER }}-tscatter${{ env.TSCATTER_VER }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ env.PY_VER }}-
      

      - name: Install deps (CPU, pinned to torch 2.2.1)
        shell: bash -l {0}
        env:
            PIP_CACHE_DIR: ${{ env.PIP_CACHE }} # <-- use the same dir we created
        run: |
          mamba run -n mjepa python -m pip install --upgrade pip setuptools wheel "numpy<2"
          mamba run -n mjepa python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==${TORCH_VER}" 

          PYG_URL="https://data.pyg.org/whl/torch-2.2.1+cpu.html"
          # Install low-level PyG wheels from the SAME index (and versions that include scatter_mean)
          # install low-level wheels that DeepChem/torch-geometric may touch
          mamba run -n mjepa python -m pip install --no-cache-dir -f "$PYG_URL" \
            "torch-scatter==${TSCATTER_VER}"
            
          # Install torch-geometric WITHOUT deps so it doesn’t upgrade the above
          mamba run -n mjepa python -m pip install "torch-geometric==2.5.3"

          mamba run -n mjepa python -m pip install -r requirements.txt

      # Sanity check Murcko is available (fail early if not)
      - name: Verify RDKit Murcko function
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python - <<'PY'
          from rdkit.Chem.Scaffolds import MurckoScaffold as MS
          assert hasattr(MS, "MurckoScaffoldSmiles"), "MurckoScaffoldSmiles missing"
          print("MurckoScaffoldSmiles present ✓")
          PY

      - name: Verify torch-scatter symbol
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python - <<'PY'
          from torch_scatter import scatter_mean
          print("scatter_mean OK ✓", scatter_mean)
          PY
          
      - name: Show pip cache dir
        shell: bash -l {0}
        env:
            PIP_CACHE_DIR: ${{ env.PIP_CACHE }}
        run: pip cache dir
        
      - name: Install test tooling
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python -m pip install -U pytest pytest-xdist
      
      - name: Run quick tests
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python -m pytest -m "not gpu and not slow" -q

  # tests_slow:
    # Future enhancements to long running tests locally
      #- name: Run slow tests
      #  run: |
      #    pytest tests -m "slow and not gpu"

  vast_smoke:
    name: Smoke on Vast (GPU present?)
    runs-on: ubuntu-latest
    needs: tests_quick
    steps:
      - name: GPU sanity
        uses: appleboy/ssh-action@v1
        with:
          host: 167.179.138.57
          username: root
          port: 40129
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: 2hJxySm9!   # leave secret empty if no passphrase
          script: |
            set -euo pipefail
            echo "user: $(whoami)"

            # GPU present?
            if command -v nvidia-smi >/dev/null 2>&1; then
              nvidia-smi --query-gpu=name,driver_version,cuda_version --format=csv,noheader
            else
              echo "nvidia-smi not found"; exit 1
            fi
             nvidia-smi --query-gpu=name,driver_version,cuda_version --format=csv,noheader
            # Optional: ensure CUDA 12.x if you plan cu121 wheels
            if ! nvidia-smi --query-gpu=cuda_version --format=csv,noheader | grep -q '^12'; then
              echo "Expected CUDA 12.x for cu121 wheels"; exit 1
            fi

  vast_deploy_and_train:
    name: Deploy + Prepare environment Vast
    runs-on: ubuntu-latest
    needs: [tests_quick, vast_smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy, install deps (CUDA)
        uses: appleboy/ssh-action@v1
        env:
          REPO_DEPLOY_KEY: ${{ secrets.REPO_DEPLOY_KEY }}  # GitHub repo deploy key (private)
          REPO: Kar488/M-JEPA
          APP_DIR: /srv/mjepa
          BRANCH: master
          VENV_DIR: /srv/mjepa/.venv
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }} 
          envs: REPO_DEPLOY_KEY,REPO,APP_DIR,BRANCH,VENV_DIR
          script: |
            set -euo pipefail
            # 0) GitHub SSH for cloning
            mkdir -p ~/.ssh
            umask 077
            printf '%s\n' "$REPO_DEPLOY_KEY" > ~/.ssh/id_github
            chmod 600 ~/.ssh/id_github
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts
            export GIT_SSH_COMMAND='ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=yes'

            # 1) Delta deploy repo
            mkdir -p "$APP_DIR"
            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" fetch --prune --tags --depth=50
              git -C "$APP_DIR" checkout "$BRANCH"
              git -C "$APP_DIR" pull --ff-only
            else
              git clone --depth=50 "git@github.com:${REPO}.git" "$APP_DIR"
              git -C "$APP_DIR" checkout "$BRANCH"
            fi

            # 2) Micromamba env (RDKit + DeepChem from conda-forge)
            ENV_NAME="mjepa"
              MM="$HOME/micromamba"
              if [ ! -x "$MM/bin/micromamba" ]; then
                curl -Ls https://micro.mamba.pm/install.sh | bash -s -- -b -p "$MM"
              fi
              eval "$("$MM/bin/micromamba" shell hook -s bash)"
              if ! micromamba env list | grep -q "^$ENV_NAME "; then
                micromamba create -y -n "$ENV_NAME" -c conda-forge \
                  python=3.10 rdkit=2023.09.5 scipy=1.10.1 pip
              fi
              micromamba run -n "$ENV_NAME" python -m pip install deepchem==2.7.1
              micromamba activate "$ENV_NAME"

            # 3) Torch (GPU, cu121) + PyG pinned to torch 2.2.1
            python -m pip install -U pip setuptools wheel "numpy<2"
            python -m pip install --index-url https://download.pytorch.org/whl/cu121 "torch==2.2.1"
            PYG_URL="https://data.pyg.org/whl/torch-2.2.1+cu121.html"
            python -m pip install -f "$PYG_URL" torch-scatter==2.1.2
            python -m pip install torch-geometric==2.5.3

            # 4) Project requirements (if present)
            if [ -f "$APP_DIR/requirements.txt" ]; then
              grep -viE '^(rdkit|deepchem)([=<>].*)?$' "$APP_DIR/requirements.txt" > /tmp/req-no-bin.txt || true
              python -m pip install -r /tmp/req-no-bin.txt
            fi
            
            # 6) Sanity checks (CUDA + Murcko)
            python - <<'PY'
            import torch
            from rdkit.Chem.Scaffolds import MurckoScaffold as MS
            print("torch:", torch.__version__)
            print("cuda available:", torch.cuda.is_available())
            if torch.cuda.is_available():
                print("device 0:", torch.cuda.get_device_name(0))
            assert hasattr(MS, "MurckoScaffoldSmiles"), "MurckoScaffoldSmiles missing — check rdkit build."
            print("MurckoScaffoldSmiles present ✓")
            PY
          
          # 7) (optional) clean up deploy key from disk - no need now as I am a single user 
          # shred -u ~/.ssh/id_github || true
          # unset REPO_DEPLOY_KEY

      # Separate deployment phases: pretrain, finetune, benchmark and case study
      # In production‑like workflows the hyper‑parameter sweep is run
      # before the full pretraining to identify the best settings.  The grid
      # search step therefore comes first.
      - name: Grid search on Vast
        # Run a small hyper‑parameter sweep to test the new
        # `grid-search` subcommand.  This step uses separate unlabeled and
        # labelled datasets to sweep over a narrow search space and logs
        # results to Weights & Biases.  It produces a CSV in the outputs
        # directory for offline inspection and logs each configuration and
        # its metrics to W&B for interactive visualisation.
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            mkdir -p logs outputs
            # Perform a hyper‑parameter grid search with a restricted search space
            # using separate unlabeled and labelled datasets.  Both JEPA and
            # contrastive baselines are included in the sweep via --methods.
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py grid-search \
              --unlabeled-dir data/BASF_AIPubChem_v4 \
              --labeled-dir data/katielinkmoleculenet_benchmark/train \
              --label-col label \
              --task-type classification \
              --methods jepa contrastive \
              --mask-ratios 0.15 \
              --contiguities 0 \
              --hidden-dims 256 \
              --num-layers-list 3 \
              --gnn-types mpnn \
              --ema-decays 0.99 \
              --add-3d-options 0 \
              --pretrain-batch-sizes 4 \
              --finetune-batch-sizes 4 \
              --pretrain-epochs-options 1 \
              --finetune-epochs-options 1 \
              --learning-rates 1e-4 \
              --seeds 42 \
              --out-csv outputs/grid_results.csv \
              --best-config-out outputs/best_grid_config.json \
              --use-wandb \
              2>&1 | tee -a logs/grid_search_$(date +%F_%H-%M).log

      - name: Pretrain on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            nvidia-smi
            mkdir -p logs outputs
            # Determine hyper‑parameters from the grid search.  If the JSON
            # file exists, parse it and construct CLI flags for the pretrain
            # command.  Otherwise fall back to minimal defaults (1 epoch,
            # batch size 4, default config values).  This allows the
            # workflow to remain functional even if the grid search skipped.
            PRETRAIN_ARGS=""
            if [ -f outputs/best_grid_config.json ]; then
              python - <<'PY' > /tmp/pretrain_args.txt
              import json, os, sys
              conf = json.load(open('outputs/best_grid_config.json'))
              args = []
              # Map keys from the grid search result to pretrain CLI args
              if 'gnn_type' in conf: args += ['--gnn-type', str(conf['gnn_type'])]
              if 'hidden_dim' in conf: args += ['--hidden-dim', str(int(conf['hidden_dim']))]
              if 'num_layers' in conf: args += ['--num-layers', str(int(conf['num_layers']))]
              if 'mask_ratio' in conf: args += ['--mask-ratio', str(conf['mask_ratio'])]
              if 'contiguous' in conf or 'contiguity' in conf:
                  # Convert boolean or int to flag name
                  flag = conf.get('contiguous') if 'contiguous' in conf else conf.get('contiguity')
                  args += ['--contiguous'] if flag else []
              if 'ema_decay' in conf: args += ['--ema-decay', str(conf['ema_decay'])]
              if 'lr' in conf: args += ['--lr', str(conf['lr'])]
              if 'pretrain_epochs' in conf or 'epochs' in conf:
                  args += ['--epochs', str(int(conf.get('pretrain_epochs', conf.get('epochs', 1))))]
              if 'pretrain_batch_size' in conf or 'batch_size' in conf:
                  args += ['--batch-size', str(int(conf.get('pretrain_batch_size', conf.get('batch_size', 4))))]
              print(' '.join(args))
              PY
                            PRETRAIN_ARGS=$(cat /tmp/pretrain_args.txt)
                          fi
            # Pretraining stage with selected hyper‑parameters.  Contrastive
            # baseline is enabled by default to match earlier behaviour.
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py pretrain \
              --unlabeled-dir data/BASF_AIPubChem_v4 \
              $PRETRAIN_ARGS \
              --contrastive \
              --output outputs/encoder.pt \
              --use-wandb \
              --config default.yaml \
              2>&1 | tee -a logs/pretrain_$(date +%F_%H-%M).log


      - name: Finetune on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            mkdir -p logs
            # Finetune stage
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py finetune \
              --labeled-dir data/katielinkmoleculenet_benchmark/train \
              --encoder outputs/encoder.pt \
              --task-type classification \
              --epochs 1 \
              --batch-size 4 \
              --patience 10 \
              --use-wandb \
              --config default.yaml \
              2>&1 | tee -a logs/finetune_$(date +%F_%H-%M).log

      - name: Benchmark on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            mkdir -p logs
            # Benchmark stage
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py benchmark \
              --labeled-dir data/katielinkmoleculenet_benchmark/train \
              --jepa-encoder outputs/encoder.pt \
              --contrastive-encoder outputs/encoder_contrastive.pt \
              --task-type classification \
              --epochs 1 \
              --batch-size 4 \
              --patience 10 \
              --use-wandb \
              --config default.yaml \
              2>&1 | tee -a logs/benchmark_$(date +%F_%H-%M).log

      - name: Tox21 case study on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            mkdir -p logs
            # Case study stage
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py tox21 \
              --csv data/tox21/data.csv \
              --task NR-AR \
              --pretrain-epochs 1 \
              --finetune-epochs 1 \
              --num-top-exclude 5 \
              --use-wandb \
              --config default.yaml \
              2>&1 | tee -a logs/tox21_$(date +%F_%H-%M).log

