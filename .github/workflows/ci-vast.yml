# .github/workflows/ci-vast.yml
name: CI → Vast GPU

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Ignore cached grid search outputs and recompute"
        required: false
        default: "false"

concurrency:
  group: vast-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /srv/mjepa
  VENV_DIR: /srv/mjepa/.venv
  PIP_CACHE_DIR: /data/mjepa/.pip-cache
  FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
  WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
  WANDB_PROJECT: m-jepa

jobs:
  tests_quick:
    name: Quick tests (no gpu, no slow)
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        # if you use submodules, add:
        # with:
        #   submodules: recursive
        #   fetch-depth: 0

      - name: Set up Miniconda (with mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.10"
          activate-environment: ml
          channels: conda-forge
          channel-priority: strict
          miniforge-version: latest
          use-mamba: true

      - name: Install RDKit + DeepChem (conda-forge)
        shell: bash -l {0}
        run: |
            mamba create -y -n mjepa -c conda-forge python=3.10 rdkit=2023.09.5 scipy=1.10.1 pip

      - name: Install DeepChem (pip, no deps)
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python -m pip install deepchem==2.8.0

      - name: Set versions (for cache key)
        run: |
          echo "PY_VER=3.10" >> $GITHUB_ENV
          echo "TORCH_VER=2.2.1" >> $GITHUB_ENV
          echo "TSCATTER_VER=2.1.2" >> $GITHUB_ENV

      - name: Define cache dirs
        run: echo "PIP_CACHE=${GITHUB_WORKSPACE}/.pip-cache" >> $GITHUB_ENV

      - name: Prepare pip cache dir
        run: mkdir -p "$PIP_CACHE"

      - name: Cache pip (CI)
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE }} # <-- use the same dir we created
          key: pip-${{ runner.os }}-py${{ env.PY_VER }}-torch${{ env.TORCH_VER }}-tscatter${{ env.TSCATTER_VER }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ env.PY_VER }}-


      - name: Install deps (CPU, pinned to torch 2.2.1)
        shell: bash -l {0}
        env:
            PIP_CACHE_DIR: ${{ env.PIP_CACHE }} # <-- use the same dir we created
        run: |
          mamba run -n mjepa python -m pip install --upgrade pip setuptools wheel "numpy<2"
          mamba run -n mjepa python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==${TORCH_VER}"

          PYG_URL="https://data.pyg.org/whl/torch-2.2.1+cpu.html"
          # Install low-level PyG wheels from the SAME index (and versions that include scatter_mean)
          # install low-level wheels that DeepChem/torch-geometric may touch
          mamba run -n mjepa python -m pip install --no-cache-dir -f "$PYG_URL" \
            "torch-scatter==${TSCATTER_VER}"

          # Install torch-geometric WITHOUT deps so it doesn’t upgrade the above
          mamba run -n mjepa python -m pip install "torch-geometric==2.5.3"

          mamba run -n mjepa python -m pip install -r requirements.txt

      # Sanity check Murcko is available (fail early if not)
      - name: Verify RDKit Murcko function
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python - <<'PY'
          from rdkit.Chem.Scaffolds import MurckoScaffold as MS
          assert hasattr(MS, "MurckoScaffoldSmiles"), "MurckoScaffoldSmiles missing"
          print("MurckoScaffoldSmiles present ✓")
          PY

      - name: Verify torch-scatter symbol
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python - <<'PY'
          from torch_scatter import scatter_mean
          print("scatter_mean OK ✓", scatter_mean)
          PY

      - name: Show pip cache dir
        shell: bash -l {0}
        env:
            PIP_CACHE_DIR: ${{ env.PIP_CACHE }}
        run: pip cache dir

      - name: Install test tooling
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python -m pip install -U pytest pytest-xdist

      - name: Run quick tests
        shell: bash -l {0}
        run: |
          mamba run -n mjepa python -m pytest -m "not gpu and not slow" -q

  # tests_slow:
    # Future enhancements to long running tests locally
      #- name: Run slow tests
      #  run: |
      #    pytest tests -m "slow and not gpu"

  vast_smoke:
    name: Smoke on Vast (GPU present?)
    runs-on: ubuntu-latest
    steps:
    # PRE-FLIGHT: prove the key+secrets work from the GitHub runner
    - name: SSH preflight (fingerprint only, passphrase key)
      run: |
        set -euxo pipefail
        umask 077
        printf '%s\n' "${{ secrets.VAST_SSH_KEY }}" > /tmp/vast_key
        chmod 600 /tmp/vast_key
        echo "Runner sees private-key fingerprint:"
        ssh-keygen -y -P "${{ secrets.VAST_SSH_PASSPHRASE }}" -f /tmp/vast_key | ssh-keygen -lf -

    - name: SSH preflight (whoami with passphrase key)
      env:
        VAST_SSH_PASSPHRASE: ${{ secrets.VAST_SSH_PASSPHRASE }}
      run: |
        set -euxo pipefail
        umask 077
        printf '%s\n' "${{ secrets.VAST_SSH_KEY }}" > /tmp/vast_key
        chmod 600 /tmp/vast_key

        # Start agent
        eval "$(ssh-agent -s)"

        # Provide passphrase via askpass
        cat > /tmp/askpass.sh <<'SH'
        #!/usr/bin/env bash
        printf '%s' "$VAST_SSH_PASSPHRASE"
        SH
            chmod +x /tmp/askpass.sh
            export SSH_ASKPASS=/tmp/askpass.sh
            export SSH_ASKPASS_REQUIRE=force
            export DISPLAY=:9999

        # Load key into agent (non-interactive)
        setsid -w sh -c 'ssh-add /tmp/vast_key < /dev/null'

        # Confirm the agent actually holds the key
        ssh-add -l

        # Now the agent holds the key; do the whoami test
        ssh -o BatchMode=yes -o StrictHostKeyChecking=no \
              -p "${{ secrets.VAST_PORT }}" \
              "${{ secrets.VAST_USER }}@${{ secrets.VAST_HOST }}" \
            whoami

    - name: GPU sanity
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VAST_HOST }}
        username: ${{ secrets.VAST_USER }}
        port: ${{ secrets.VAST_PORT }}
        key: ${{ secrets.VAST_SSH_KEY }}
        passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}   # only include if your key is encrypted
        script: |
          set -euo pipefail
          whoami
          nvidia-smi
          python3 - <<'PY' || true
          import importlib, sys
          m = importlib.util.find_spec("torch")
          print("torch installed?", bool(m))
          if not m:
              sys.exit(0)
          import torch
          print("torch:", torch.__version__)
          print("cuda available:", torch.cuda.is_available())
          if torch.cuda.is_available():
              print("device 0:", torch.cuda.get_device_name(0))
          PY

  vast_deploy_and_prepare_environment:
    name: Deploy + Prepare environment Vast
    runs-on: ubuntu-latest
    needs: [tests_quick, vast_smoke]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Mamba root
        run: |
          export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
          echo "MAMBA_ROOT_PREFIX=/data/mjepa/micromamba" >> $GITHUB_ENV

      - name: Deploy, install deps (CUDA)
        uses: appleboy/ssh-action@v1
        env:
          REPO_TOKEN: ${{ secrets.GH_PAT_RO }}       # PAT with repo read access
          REPO: Kar488/M-JEPA
          APP_DIR: /srv/mjepa
          BRANCH: master
          VENV_DIR: /srv/mjepa/.venv
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          envs: REPO_TOKEN,REPO,APP_DIR,BRANCH,VENV_DIR
          script: |
            set -euxo pipefail

            # 0) GitHub SSH for cloning
            #mkdir -p ~/.ssh
            #umask 077
            #printf '%s\n' "$REPO_TOKEN" > ~/.ssh/id_github
            #chmod 600 ~/.ssh/id_github
            #ssh-keyscan -H github.com >> ~/.ssh/known_hosts
            #export GIT_SSH_COMMAND='ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=yes'

            # 1) Clone/update repo over HTTPS using PAT, with small footprint
            AUTH_URL="https://x-access-token:${REPO_TOKEN}@github.com/${REPO}.git"
            export GIT_LFS_SKIP_SMUDGE=1
            mkdir -p "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" remote set-url origin "$AUTH_URL"
              # Shallow fetch the exact branch
              git -C "$APP_DIR" fetch --prune --depth=1 --filter=blob:none origin "$BRANCH"
              # Make local branch exactly match remote (handles forced updates/divergence)
              git -C "$APP_DIR" checkout -B "$BRANCH" "origin/$BRANCH"
              git -C "$APP_DIR" reset --hard "origin/$BRANCH"
              git -C "$APP_DIR" clean -fdx
            else
              git clone --depth=1 --filter=blob:none "$AUTH_URL" "$APP_DIR"
              git -C "$APP_DIR" checkout "$BRANCH"
            fi

            # 2) Locate / install micromamba
            set -Eeuo pipefail

            APP_TMP="${APP_DIR:-/srv/mjepa}/.tmp"
            mkdir -p "$APP_TMP"

            # Use a prefix you definitely own
            MM_PREFIX="${HOME}/micromamba"
            MM_BIN="${MM_PREFIX}/bin/micromamba"
            MMBIN="$MM_BIN"

            # Make sure both the prefix and its bin folder exist and are writable
            mkdir -p "${MM_PREFIX}/bin"

            # Pick the correct artifact once
            UNAME_M="$(uname -m)"
            case "$UNAME_M" in
              x86_64|amd64)  MARCH="linux-64" ;;
              aarch64|arm64) MARCH="linux-aarch64" ;;
              *) echo "Unsupported arch: $UNAME_M" >&2; exit 1 ;;
            esac

            if ! [ -x "$MM_BIN" ]; then
              TARB="$APP_TMP/micromamba.tar.bz2"
              rm -f "$TARB"
              curl -fL --retry 3 -o "$TARB" "https://micro.mamba.pm/api/micromamba/${MARCH}/latest"
              # Extract only the micromamba binary
              tar -xjf "$TARB" -C "$APP_TMP" bin/micromamba
              install -m 0755 "$APP_TMP/bin/micromamba" "$MM_BIN"
            fi

            # Shell hook via absolute path; no dependence on PATH
            export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
            export MAMBA_EXE="$MM_BIN"
            set +u
            eval "$("$MM_BIN" shell hook -s bash)"
            set -u

            # 3) Create env if missing
            ENV_NAME="mjepa"
            ENV_DIR="$MAMBA_ROOT_PREFIX/envs/$ENV_NAME"
            if ! [ -d "$ENV_DIR" ]; then
              "$MM_BIN" create -y -n "$ENV_NAME" -c conda-forge python=3.10 rdkit=2023.09.5 scipy=1.10.1 pip
            fi

            # 4) put pip temp/cache on your big volume + pre-clean ---
            mkdir -p "$APP_DIR/.pip-cache" "$APP_DIR/.tmp"
            export PIP_CACHE_DIR="$APP_DIR/.pip-cache"
            export TMPDIR="$APP_DIR/.tmp"
            export PIP_DISABLE_PIP_VERSION_CHECK=1
            "$MMBIN" clean -y --all --force-pkgs-dirs || true
            "$MMBIN" run -n "$ENV_NAME" python -m pip cache purge || true
            rm -rf "$APP_DIR/.tmp"/pip-* || true

            # 5) Base Python deps + DeepChem
            "$MMBIN" run -n "$ENV_NAME" python -m pip install -U pip setuptools wheel "numpy<2"
            "$MMBIN" run -n "$ENV_NAME" python -m pip install deepchem==2.8.0


            # 6) Torch (skip install if already present with CUDA to save space)
            cat <<'PY' | "$MMBIN" run -n "$ENV_NAME" python - >/tmp/torch_check.json || true
            try:
                import torch, json
                print(json.dumps({"present": True,
                                  "ver": getattr(torch,"__version__",None),
                                  "cuda": bool(getattr(torch,"cuda",None) and torch.cuda.is_available())}))
            except Exception:
                print('{"present": false, "ver": null, "cuda": false}')
            PY
              if grep -q '"present": true' /tmp/torch_check.json && grep -q '"cuda": true' /tmp/torch_check.json; then
                echo "✓ Torch with CUDA already present in env; skipping install"
              else
                echo "Installing Torch (cu121)…"
                "$MMBIN" run -n "$ENV_NAME" python -m pip install --no-cache-dir \
                  --index-url https://download.pytorch.org/whl/cu121 "torch==2.2.1"
              fi

            # 7) (Optional) PyG pieces — only if you actually need them on Vast
            #PYG_URL="https://data.pyg.org/whl/torch-2.2.1+cu121.html"
            #"$MMBIN" run -n "$ENV_NAME" python -m pip install --no-cache-dir -f "$PYG_URL" torch-scatter==2.1.2
            #"$MMBIN" run -n "$ENV_NAME" python -m pip install --no-deps --no-cache-dir torch-geometric==2.5.3

            # Detect if DeepChem / your code needs torch_scatter / torch_geometric
            PYG_URL=$("$MMBIN" run -n "$ENV_NAME" python - <<'PY'
            import torch
            ver = torch.__version__.split('+')[0]         # e.g. 2.2.1
            cuda = torch.version.cuda                     # e.g. 12.1 or None
            suffix = f"cu{cuda.replace('.','')}" if cuda else "cpu"
            print(f"https://data.pyg.org/whl/torch-{ver}+{suffix}.html")
            PY
            )

            # Detect if we really need PyG bits
            "$MMBIN" run -n "$ENV_NAME" python - <<'PY' >/tmp/pyg_need.json || true
            import json, importlib.util
            needs = {"torch_scatter": False, "torch_geometric": False, "torch_sparse": False}
            miss = lambda m: importlib.util.find_spec(m) is None

            # direct module probes
            needs["torch_scatter"]   = miss("torch_scatter")
            needs["torch_geometric"] = miss("torch_geometric")

            # DeepChem path sometimes touches scatter/layers
            try:
                import deepchem as dc
                from deepchem.models.torch_models import layers as dcl
                _ = getattr(dcl, "scatter_mean", None)
            except Exception as e:
                s = str(e).lower()
                if "torch_scatter" in s: needs["torch_scatter"] = True
                if "torch_geometric" in s or "torch_sparse" in s:
                    needs["torch_geometric"] = True
                    needs["torch_sparse"] = True

            print(json.dumps(needs))
            PY

            # Install only what’s required (matching your Torch/CUDA)
            if grep -q '"torch_scatter": true' /tmp/pyg_need.json; then
              "$MMBIN" run -n "$ENV_NAME" python -m pip install --no-cache-dir -f "$PYG_URL" torch-scatter==2.1.2
            fi
            if grep -q '"torch_sparse": true' /tmp/pyg_need.json; then
              "$MMBIN" run -n "$ENV_NAME" python -m pip install --no-cache-dir -f "$PYG_URL" \
                torch-sparse==0.6.18 torch-cluster==1.6.3 torch-spline-conv==1.2.2
            fi
            if grep -q '"torch_geometric": true' /tmp/pyg_need.json; then
              "$MMBIN" run -n "$ENV_NAME" python -m pip install --no-deps --no-cache-dir torch-geometric==2.5.3
            fi


            # 8) Project requirements (avoid clobbering rdkit/torch)
            if [ -f "$APP_DIR/requirements.txt" ]; then
              grep -viE '^(rdkit|torch|torch-geometric|torch-scatter)([=<>].*)?$' "$APP_DIR/requirements.txt" > /tmp/req-safe.txt || true
              if [ -s /tmp/req-safe.txt ]; then
                "$MMBIN" run -n "$ENV_NAME" python -m pip install -r /tmp/req-safe.txt
              fi
            fi

            # 9) Clean caches to reclaim space
            "$MMBIN" run -n "$ENV_NAME" python -m pip cache purge || true
            "$MMBIN" clean -y --all --force-pkgs-dirs || true
            rm -rf "$APP_DIR/.tmp"/pip-* || true

            # 10) Sanity (CUDA + Murcko) — heredoc piped to avoid indent issues
            "$MMBIN" run -n "$ENV_NAME" python - <<'PY'
            import torch
            from rdkit.Chem.Scaffolds import MurckoScaffold as MS
            print("torch:", torch.__version__, "cuda avail:", torch.cuda.is_available())
            if torch.cuda.is_available():
                print("device 0:", torch.cuda.get_device_name(0))
            assert hasattr(MS, "MurckoScaffoldSmiles")
            print("MurckoScaffoldSmiles present ✓")
            PY

          # 7) (optional) clean up deploy key from disk - no need now as I am a single user
          # shred -u ~/.ssh/id_github || true
          # unset REPO_DEPLOY_KEY

  vast_learn_hyperparameters:
    name: Learn hyperparameters
    runs-on: ubuntu-latest
    needs: vast_deploy_and_prepare_environment
    steps:
        - name: Set Mamba root
          run: |
            export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
            echo "MAMBA_ROOT_PREFIX=/data/mjepa/micromamba" >> $GITHUB_ENV

        # Separate deployment phases: pretrain, finetune, benchmark and case study
        # In production‑like workflows the hyper‑parameter sweep is run
        # before the full pretraining to identify the best settings.  The grid
        # search step therefore comes first.
        - name: Grid search on Vast
          # Run a small hyper‑parameter sweep to test the new
          # `grid-search` subcommand.  This step uses separate unlabeled and
          # labelled datasets to sweep over a narrow search space and logs
          # results to Weights & Biases.  It produces a CSV in the outputs
          # directory for offline inspection and logs each configuration and
          # its metrics to W&B for interactive visualisation.
          uses: appleboy/ssh-action@v1
          timeout-minutes: 180            # GitHub step timeout
          with:
            host: ${{ secrets.VAST_HOST }}
            username: ${{ secrets.VAST_USER }}
            port: ${{ secrets.VAST_PORT }}
            key: ${{ secrets.VAST_SSH_KEY }}
            passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
            # Force refresh will rerun grid search default is false and not run grid search if outputs exist
            envs: APP_DIR,FORCE_REFRESH,WANDB_API_KEY,WANDB_PROJECT
            command_timeout: 180m         # <-- default is 10m; bump this
            script: |
              set -euxo pipefail

              # --- locate micromamba robustly ---
              if command -v micromamba >/dev/null 2>&1; then
                MMBIN="$(command -v micromamba)"
              elif [ -x "$HOME/.local/bin/micromamba" ]; then
                MMBIN="$HOME/.local/bin/micromamba"
              elif [ -x "$HOME/micromamba/bin/micromamba" ]; then
                MMBIN="$HOME/micromamba/bin/micromamba"
              else
                echo "micromamba not found; run the prepare step first." >&2
                exit 1
              fi
              export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
              # ensure micromamba’s shell functions are available in this non-login shell
              eval "$("$MMBIN" shell hook -s bash)" || true
              
              export WANDB_DIR=/data/mjepa/wandb
              : "${APP_DIR:?APP_DIR not set}"
              cd "$APP_DIR"
              mkdir -p logs outputs

              # Perform a hyper‑parameter grid search with a restricted search space
              # using separate unlabeled and labelled datasets.  Both JEPA and
              # contrastive baselines are included in the sweep via --methods.

              # Removed python -m torch.distributed.run due to PATH issues with entrypoints

              export PYTHONPATH="$APP_DIR:${PYTHONPATH:-}"
              # grid search results are in best-config-out so it can used in training

              # Skip grid search if cached outputs exist
              FR=""
              if [ "${FORCE_REFRESH}" = "true" ]; then
                FR="--force-refresh"
              fi

              # sample-unlabeled -- < use a 1000000 (10,000,000- 10M) when working fully matching word doc spec
              # sample-labeled <-- use a 20000 (20K) when working fully matching word doc spec (≈17K across data classes e.g, ESOL, BACE etc)
              # zero values for max-pretrain-batches and max-finetune-batches mean no limit
              # time-budget-mins 0 means no time limit
              # moleculenet dataset, column "measured log solubility in mols per litre" is used for regression task

              if [ "${FORCE_REFRESH}" != "true" ] && [ -f outputs/grid_results.csv ] && [ -f outputs/best_grid_config.json ]; then
                echo "Grid search outputs already exist; skipping grid search."
              else
                "$MMBIN" run -n mjepa python scripts/train_jepa.py grid-search \
                  --unlabeled-dir data/ZINC-canonicalized \
                  --labeled-dir data/katielinkmoleculenet_benchmark/train \
                  --label-col "measured log solubility in mols per litre" \
                  --cache-dir /data/mjepa/cache/graphs \
                  --task-type regression \
                  --methods jepa contrastive \
                  --mask-ratios 0.15 0.3 0.5 \
                  --contiguities 0 1 \
                  --hidden-dims 256 \
                  --num-layers-list 3 \
                  --gnn-types mpnn \
                  --ema-decays 0.996 0.998 0.999 \
                  --add-3d-options 1 \
                  --pretrain-batch-sizes 4 \
                  --finetune-batch-sizes 4 \
                  --pretrain-epochs-options 20 30 \
                  --finetune-epochs-options 1 \
                  --learning-rates 1e-4 \
                  --seeds 1 2 3 \
                  --sample-unlabeled 50000 \
                  --sample-labeled 5000 \
                  --n-rows-per-file 50 \
                  --max-pretrain-batches 0 \
                  --max-finetune-batches 0 \
                  --num-workers 8 \
                  --time-budget-mins 60 \
                  --force-tqdm \
                  --out-csv outputs/grid_results.csv \
                  --best-config-out outputs/best_grid_config.json \
                  --use-wandb \
                  $FR \
                  2>&1 | tee -a logs/grid_search_$(date +%F_%H-%M).log
              fi

  vast_pretrain:
    name: Pretain JEPA Model
    runs-on: ubuntu-latest
    needs: vast_learn_hyperparameters
    steps:
    - name: Set Mamba root
      run: |
        export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
        echo "MAMBA_ROOT_PREFIX=/data/mjepa/micromamba" >> $GITHUB_ENV
    
    - name: Pretrain JEPA on Vast
      uses: appleboy/ssh-action@v1
      timeout-minutes: 180            # GitHub step timeout
      with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          envs: APP_DIR,FORCE_REFRESH,WANDB_API_KEY,WANDB_PROJECT
          command_timeout: 240m         # <-- default is 10m; bump this - keep in sync with run command below
          script: |
            set -euxo pipefail

            # --- locate micromamba robustly ---
            if command -v micromamba >/dev/null 2>&1; then
              MMBIN="$(command -v micromamba)"
            elif [ -x "$HOME/.local/bin/micromamba" ]; then
              MMBIN="$HOME/.local/bin/micromamba"
            elif [ -x "$HOME/micromamba/bin/micromamba" ]; then
              MMBIN="$HOME/micromamba/bin/micromamba"
            else
              echo "micromamba not found; run the prepare step first." >&2
              exit 1
            fi
            export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
            # ensure micromamba’s shell functions are available in this non-login shell
            eval "$("$MMBIN" shell hook -s bash)" || true

            export WANDB_DIR=/data/mjepa/wandb
            # (optional) avoid port/login issues
            export WANDB_MODE=offline
            : "${APP_DIR:?APP_DIR not set}"
            cd "$APP_DIR"
            mkdir -p logs outputs cache/graphs
            # stream Python logs immediately (and keep wandb chatty-free)  WANDB_CONSOLE=off WANDB__SERVICE_WAIT=0
            export PYTHONUNBUFFERED=1

            # Determine hyper‑parameters from the grid search.  If the JSON
            # file exists, parse it and construct CLI flags for the pretrain
            # command.  Otherwise fall back to minimal defaults (1 epoch,
            # batch size 4, default config values).  This allows the
            # workflow to remain functional even if the grid search skipped.

            PRETRAIN_ARR=()
            CKPT_DIR="outputs/ckpts/pretrain"
            mkdir -p "$CKPT_DIR"

            RESUME_ARGS=()
            LATEST=$(ls -1t "$CKPT_DIR"/seed_*/*epoch_*.pt 2>/dev/null | head -n 1 || true)
            if [ -n "$LATEST" ]; then
              echo "Resuming from $LATEST"
              RESUME_ARGS=(--resume-ckpt "$LATEST")
            fi

            if [ -f outputs/best_grid_config.json ] || [ -f scripts/default.yaml ]; then
              PRETRAIN_JSON="outputs/best_grid_config.json"
              PRETRAIN_YAML="scripts/default.yaml"

              mapfile -t PRETRAIN_ARR < <("$MMBIN" run -n mjepa python -c '
              import json, sys, os
              # Try YAML; tolerate absence of PyYAML
              try:
                  import yaml
              except Exception:
                  yaml = None
              cfg = {}
              # 1) YAML defaults (top-level or under "pretrain")
              ypath = sys.argv[2]
              if ypath and os.path.isfile(ypath) and yaml is not None:
                  y = yaml.safe_load(open(ypath)) or {}
                  y = y.get("pretrain", y)
                  if isinstance(y, dict):
                      cfg.update(y)
              # 2) Grid JSON overlays
              jpath = sys.argv[1]
              if jpath and os.path.isfile(jpath):
                  j = json.load(open(jpath)) or {}
                  if isinstance(j, dict):
                      cfg.update(j)
              # 3) Build CLI args
              args = []
              def add(flag, val):
                  if val is None: return
                  args.extend([flag, str(val)])
              add("--gnn-type",    cfg.get("gnn_type"))
              add("--hidden-dim",  cfg.get("hidden_dim"))
              add("--num-layers",  cfg.get("num_layers"))
              add("--mask-ratio",  cfg.get("mask_ratio", 0.15))
              if bool(cfg.get("add_3d")): args.append("--add-3d")
              if bool(cfg.get("contiguous", cfg.get("contiguity"))): args.append("--contiguous")
              add("--ema-decay",   cfg.get("ema_decay"))
              add("--lr",          cfg.get("lr"))
              add("--epochs",      cfg.get("pretrain_epochs", cfg.get("epochs", 20)))
              add("--batch-size",  cfg.get("pretrain_batch_size", cfg.get("batch_size", 4)))
              method = (cfg.get("method") or "").lower()
              if method == "contrastive":
                  args.append("--contrastive")
              print("\\n".join(args))
              ' "$PRETRAIN_JSON" "$PRETRAIN_YAML")
            fi

            # Pretraining stage with selected hyper‑parameters.  Contrastive
            # baseline is enabled by default to match earlier behaviour.

            export PYTHONPATH="$APP_DIR:${PYTHONPATH:-}"
            # change timeout if needed, e.g. 120m for 2 hours
            # bump workers to 2 once stabble
            "$MMBIN" run -n mjepa stdbuf -oL -eL timeout -s SIGINT 240m python -u scripts/train_jepa.py pretrain \
              --unlabeled-dir data/ZINC-canonicalized \
              "${PRETRAIN_ARR[@]}" \
              --cache-dir /data/mjepa/cache/graphs \
              --num-workers 0 \
              --ckpt-dir "$CKPT_DIR" \
              --save-every 1 \
              --output outputs/encoder.pt \
              "${RESUME_ARGS[@]}" \
              --use-wandb \
              --seeds 42 \
              2>&1 | tee -a logs/pretrain_$(date +%F_%H-%M).log

  vast_finetune:
    name: Apply fine tuning
    runs-on: ubuntu-latest
    needs: vast_pretrain
    steps:
        - name: Set Mamba root
          run: |
            export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
            echo "MAMBA_ROOT_PREFIX=/data/mjepa/micromamba" >> $GITHUB_ENV

        - name: Finetune on Vast
          uses: appleboy/ssh-action@v1
          timeout-minutes: 180            # GitHub step timeout
          with:
            host: ${{ secrets.VAST_HOST }}
            username: ${{ secrets.VAST_USER }}
            port: ${{ secrets.VAST_PORT }}
            key: ${{ secrets.VAST_SSH_KEY }}
            passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
            envs: APP_DIR,FORCE_REFRESH,WANDB_API_KEY,WANDB_PROJECT
            command_timeout: 180m         # <-- default is 10m; bump this
            script: |
              set -euxo pipefail

              # --- locate micromamba robustly ---
              if command -v micromamba >/dev/null 2>&1; then
                MMBIN="$(command -v micromamba)"
              elif [ -x "$HOME/.local/bin/micromamba" ]; then
                MMBIN="$HOME/.local/bin/micromamba"
              elif [ -x "$HOME/micromamba/bin/micromamba" ]; then
                MMBIN="$HOME/micromamba/bin/micromamba"
              else
                echo "micromamba not found; run the prepare step first." >&2
                exit 1
              fi
              export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
              # ensure micromamba’s shell functions are available in this non-login shell
              eval "$("$MMBIN" shell hook -s bash)" || true

              export WANDB_DIR=/data/mjepa/wandb
              # (optional) avoid port/login issues
              export WANDB_MODE=offline
              : "${APP_DIR:?APP_DIR not set}"
              cd "$APP_DIR"
              mkdir -p logs outputs

              CKPT_DIR="outputs/ckpts/finetune"
              mkdir -p "$CKPT_DIR"
              RESUME_ARGS=()
              LATEST=$(ls -1t "$CKPT_DIR"/seed_*/ft_epoch_*.pt 2>/dev/null | head -n 1 || true)
              if [ -n "$LATEST" ]; then
                echo "Resuming from $LATEST"
                RESUME_ARGS=(--resume-ckpt "$LATEST")
              fi

              # Build FINETUNE args from best_grid_config.json and scripts/default.yaml (if present)
              FINETUNE_ARR=()
              if [ -f outputs/best_grid_config.json ] || [ -f scripts/default.yaml ]; then
                FINETUNE_JSON="outputs/best_grid_config.json"
                FINETUNE_YAML="scripts/default.yaml"
                mapfile -t FINETUNE_ARR < <("$MMBIN" run -n mjepa python -c 'import sys, json, os
                try:
                    import yaml
                except Exception:
                    yaml=None
                cfg={}
                # YAML defaults (top-level or under "finetune")
                yp=sys.argv[2]
                if yp and os.path.isfile(yp) and yaml is not None:
                    y=yaml.safe_load(open(yp)) or {}
                    y=y.get("finetune", y)
                    if isinstance(y, dict): cfg.update(y)
                # Grid JSON overrides
                jp=sys.argv[1]
                if jp and os.path.isfile(jp):
                    j=json.load(open(jp)) or {}
                    if isinstance(j, dict): cfg.update(j)
                args=[]
                def add(flag,val):
                    if val is None: return
                    args.extend([flag,str(val)])
                add("--batch-size", cfg.get("finetune_bs", cfg.get("batch_size", 4)))
                add("--epochs",     cfg.get("finetune_epochs", cfg.get("epochs", 1)))
                print("\n".join(args))' "$FINETUNE_JSON" "$FINETUNE_YAML")
              fi

              # Finetune stage
              export PYTHONPATH="$APP_DIR:${PYTHONPATH:-}"
              "$MMBIN" run -n mjepa python scripts/train_jepa.py finetune \
                --labeled-dir data/katielinkmoleculenet_benchmark/train \
                --encoder outputs/encoder.pt \
                --task-type regression \
                --label-col "measured log solubility in mols per litre" \
                --cache-dir /data/mjepa/cache/graphs \
                "${FINETUNE_ARR[@]}" \
                --num-workers 8 \
                --patience 10 \
                --ckpt-dir "$CKPT_DIR" \
                --save-every 1 \
                --metric val_loss \
                "${RESUME_ARGS[@]}" \
                --use-wandb \
                --seeds 42 \
                2>&1 | tee -a "logs/finetune_$(date +%F_%H-%M).log"

  vast_benchmark:
    name: Conduct Benchmarks
    needs: vast_finetune
    runs-on: ubuntu-latest
    steps:
        - name: Set Mamba root
          run: |
            export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
            echo "MAMBA_ROOT_PREFIX=/data/mjepa/micromamba" >> $GITHUB_ENV

        - name: Benchmark on Vast
          uses: appleboy/ssh-action@v1
          timeout-minutes: 180            # GitHub step timeout
          with:
            host: ${{ secrets.VAST_HOST }}
            username: ${{ secrets.VAST_USER }}
            port: ${{ secrets.VAST_PORT }}
            key: ${{ secrets.VAST_SSH_KEY }}
            passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
            envs: APP_DIR,FORCE_REFRESH,WANDB_API_KEY,WANDB_PROJECT
            command_timeout: 180m         # <-- default is 10m; bump this
            script: |
              set -euxo pipefail

              # --- locate micromamba robustly ---
              if command -v micromamba >/dev/null 2>&1; then
                MMBIN="$(command -v micromamba)"
              elif [ -x "$HOME/.local/bin/micromamba" ]; then
                MMBIN="$HOME/.local/bin/micromamba"
              elif [ -x "$HOME/micromamba/bin/micromamba" ]; then
                MMBIN="$HOME/micromamba/bin/micromamba"
              else
                echo "micromamba not found; run the prepare step first." >&2
                exit 1
              fi
              export MAMBA_ROOT_PREFIX=/data/mjepa/micromamba
              eval "$("$MMBIN" shell hook -s bash)" || true
              export WANDB_DIR=/data/mjepa/wandb
              # (optional) avoid port/login issues
              export WANDB_MODE=offline
              cd "$APP_DIR"
              mkdir -p logs outputs

              export PYTHONPATH="$APP_DIR:${PYTHONPATH:-}"

              # Build encoder/ckpt args dynamically
              BENCH_MODEL_ARR=()
              [ -f outputs/encoder.pt ]             && BENCH_MODEL_ARR+=(--jepa-encoder outputs/encoder.pt)
              [ -f outputs/encoder_jepa.pt ]        && BENCH_MODEL_ARR+=(--jepa-encoder outputs/encoder_jepa.pt)
              [ -f outputs/encoder_contrastive.pt ] && BENCH_MODEL_ARR+=(--contrastive-encoder outputs/encoder_contrastive.pt)
              FT_CKPT=""
              if compgen -G "outputs/ckpts/finetune/seed_*/ft_best*.pt" > /dev/null; then
                FT_CKPT="$(ls -1t outputs/ckpts/finetune/seed_*/ft_best*.pt | head -n1)"
              elif compgen -G "outputs/ckpts/finetune/seed_*/ft_epoch_*.pt" > /dev/null; then
                FT_CKPT="$(ls -1t outputs/ckpts/finetune/seed_*/ft_epoch_*.pt | head -n1)"
              fi
              [ -n "${FT_CKPT:-}" ] && BENCH_MODEL_ARR+=(--ft-ckpt "$FT_CKPT")

              # Merge scripts/default.yaml (benchmark:) + best_grid_config.json into CLI flags
              BENCH_JSON="outputs/best_grid_config.json"
              BENCH_YAML="scripts/default.yaml"
              BENCH_HPARAM_ARR=()
              mapfile -t BENCH_HPARAM_ARR < <("$MMBIN" run -n mjepa python -c '
              import sys, json, os
              try:
                  import yaml
              except Exception:
                  yaml=None
              cfg={}
              # YAML defaults (prefer section "benchmark")
              yp=sys.argv[2]
              if yp and os.path.isfile(yp) and yaml is not None:
                  y=yaml.safe_load(open(yp)) or {}
                  y=y.get("benchmark", y)
                  if isinstance(y, dict): cfg.update(y)
              # Grid JSON (may provide batch_size/epochs via {finetune_bs, epochs})
              jp=sys.argv[1]
              if jp and os.path.isfile(jp):
                  j=json.load(open(jp)) or {}
                  if isinstance(j, dict): cfg.update(j)
              args=[]
              def add(flag,val):
                  if val is None: return
                  args.extend([flag,str(val)])
              # sensible defaults, overrideable by YAML/JSON
              add("--batch-size", cfg.get("batch_size", cfg.get("finetune_bs", 4)))
              add("--epochs",     cfg.get("epochs", 1))
              add("--num-workers",cfg.get("num_workers", 8))
              add("--patience",   cfg.get("patience", 10))
              # optional: task/label (default ESOL regression; override in YAML if different)
              task = cfg.get("task_type") or cfg.get("task") or "regression"
              label= cfg.get("label_col") or "measured log solubility in mols per litre"
              args += ["--task-type", str(task), "--label-col", str(label)]
              seed = cfg.get("seeds") or cfg.get("seed")
              if seed: args += ["--seeds", str(seed)]
              print("\n".join(args))' "$BENCH_JSON" "$BENCH_YAML")

                            "$MMBIN" run -n mjepa python scripts/train_jepa.py benchmark \
                              --labeled-dir data/katielinkmoleculenet_benchmark/train \
                              --report-dir outputs/reports \
                              --cache-dir /data/mjepa/cache/graphs \
                              "${BENCH_HPARAM_ARR[@]}" \
                              "${BENCH_MODEL_ARR[@]}" \
                              --use-wandb \
                              2>&1 | tee -a "logs/benchmark_$(date +%F_%H-%M).log"

