# .github/workflows/ci-vast.yml
name: CI → Vast GPU

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      task_flags:
        description: >-
          Comma separated flags controlling optional tasks.
          Supported values: force_refresh, run_unit_tests, run_vast_jobs,
          force_unfreeze_grid. Example: "run_unit_tests,run_vast_jobs".
          Omit a flag to skip its task.
        required: false
        default: "force_refresh,run_unit_tests,run_vast_jobs"
      cache_overrides:
        description: >-
          JSON object mapping cache keys (sweep, grid, pretrain, finetune,
          bench, tox21, reports) to custom directories. Example:
          '{"grid": "/data/custom/grid", "sweep": "/tmp/sweeps"}'.
        required: false
        default: "{}"
      force_rerun:
        description: "Comma-separated stage names to force rerun"
        required: false
        default: ""
      hyperparam_mode:
        description: "Which hyperparameter search strategy to use"
        required: false
        default: "wandb"
        type: choice
        options:
          - custom
          - wandb

concurrency:
  group: vast-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /srv/mjepa
  VENV_DIR: /srv/mjepa/.venv
  PIP_CACHE_DIR: /data/mjepa/.pip-cache
  RUN_UNIT_TESTS: ${{ ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_unit_tests')) && 'true' || 'false' }}
  RUN_VAST_JOBS: ${{ ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) && 'true' || 'false' }}
  FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.task_flags || '', 'force_refresh') && 'true' || 'false' }}
  WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
  WANDB_ENTITY: karthik-iyer-la-trobe-university
  WANDB_PROJECT: m-jepa
  WANDB_RUN_ID: ${{ github.run_id }}
  WANDB_RESUME: allow
  WANDB_RUN_GROUP: ${{ github.run_id }}
  MAMBA_ROOT_PREFIX: /data/mjepa/micromamba
  WANDB_DIR: /data/mjepa/wandb
  WANDB_SWEEP_ID1: ey6pd85u
  WANDB_SWEEP_ID2: ongqx38g
  WANDB_COUNT: 30
  HARD_WALL_MINS: 1500
  KILL_AFTER_SECS: 120
  GRID_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb' }}
  CACHE_DIR: /data/mjepa/cache/graphs_250k
  SWEEP_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).sweep || '/data/mjepa/cache/graphs_250k' }}
  EXPERIMENTS_ROOT: /data/mjepa/experiments
  RUN_ID: ${{ github.run_id }}
  EXP_ID: ${{ github.run_id }}
  PRETRAIN_EXP_ID: ${{ github.run_id }}
  GRID_EXP_ID: ${{ github.run_id }}
  # as such this cache is used inside a single run only
  #Changing cache to be used across runs, change to fixed directory e.g. /data/mjepa/cache/grid
  # either delete stamp (rm /data/mjepa/cache/grid/.stamp) or point to empty directory ("") for forced reruns
  # GRID_CACHE_DIR: ${{ github.event.inputs.grid_cache_dir || '' }}
  # PRETRAIN_CACHE_DIR: ${{ github.event.inputs.pretrain_cache_dir || '' }}
  # FINETUNE_CACHE_DIR: ${{ github.event.inputs.finetune_cache_dir || '' }}
  # BENCH_CACHE_DIR: ${{ github.event.inputs.bench_cache_dir || '' }}
  # TOX21_CACHE_DIR: ${{ github.event.inputs.tox21_cache_dir || '' }}
  GRID_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).grid || '/data/mjepa/cache/grid' }}
  PRETRAIN_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).pretrain || '/data/mjepa/cache/pretrain' }}
  FINETUNE_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).finetune || '/data/mjepa/cache/finetune' }}
  BENCH_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).bench || '/data/mjepa/cache/bench' }}
  TOX21_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).tox21 || '/data/mjepa/cache/tox21' }}
  REPORTS_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).reports || '/data/mjepa/cache/reports' }}
  FORCE_UNFREEZE_GRID: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.task_flags || '', 'force_unfreeze_grid') && '1' || '0' }}
  CI_FORCE_UNFREEZE_GRID: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.task_flags || '', 'force_unfreeze_grid') && '1' || '0' }}
  CI_PHASE1_FORCE_REUSE_GRID: '0'
  CI_PHASE2_FORCE_REUSE_PHASE2_IDS: '0'
  FORCE_RERUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_rerun || '' }}
  GRID_MODE_VAR: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb' }}

jobs:
  # Vast workloads still execute on the remote GPU tenant. Even though many jobs
  # run on the "git runner" (a self-hosted GitHub runner), we continue to use
  # appleboy/ssh-action to hop into the Vast host so scripts run where the GPUs
  # and experiment directories live.
  tests_quick:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_unit_tests') }}

    name: Quick tests (no gpu, no slow)
    runs-on: ubuntu-latest #self-hosted
    env:
      MJEPA_ALLOW_DATA_FALLBACKS: '0'
      MAMBA_ROOT_PREFIX: ~/micromamba
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Remove stale micromamba binary
        run: |
          rm -f "$HOME/micromamba-bin/micromamba"
      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: mjepa
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=3.10 rdkit=2023.09.5 scipy pip
      - name: Install deps
        run: |
          micromamba run -n mjepa python -m pip install --no-deps deepchem==2.8.0
          micromamba run -n mjepa python -m pip install --upgrade pip setuptools wheel "numpy<2"
          micromamba run -n mjepa python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.1
          micromamba run -n mjepa python -m pip install --no-cache-dir -f https://data.pyg.org/whl/torch-2.2.1+cpu.html torch-scatter==2.1.2
          micromamba run -n mjepa python -m pip install torch-geometric==2.5.3
          micromamba run -n mjepa python -m pip install -r requirements.txt
      - name: Verify installs
        run: |
          micromamba run -n mjepa python - <<'PY'
          import torch, rdkit, deepchem, torch_scatter, torch_geometric
          print('torch', torch.__version__)
          print('cuda', torch.cuda.is_available())
          from rdkit import Chem
          print('rdkit', rdkit.__version__)
          print('deepchem', deepchem.__version__)
          print('torch_scatter', torch_scatter.__version__)
          print('torch_geometric', torch_geometric.__version__)
          PY
      - name: Run tests
        run: micromamba run -n mjepa python -m pytest -m "not gpu and not slow" --capture=tee-sys -q

  vast_smoke:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Smoke on Vast (GPU present?)
    runs-on: ubuntu-latest
    steps:
      - name: GPU sanity
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          script: |
            set -e
            whoami
            nvidia-smi
            python3 - <<'PY' || true
            import torch
            print('torch:', torch.__version__)
            print('cuda available:', torch.cuda.is_available())
            PY

  vast_deploy:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Deploy repository to Vast host
    runs-on: ubuntu-latest
    needs: vast_smoke
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1
      - name: Bootstrap environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,MAMBA_ROOT_PREFIX
          script: |
            set -e
            mkdir -p "$APP_DIR"
            if [ ! -x "/data/mjepa/micromamba/bin/micromamba" ]; then
              mkdir -p /data/mjepa/micromamba
              curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest \
                | tar -xj -C /data/mjepa/micromamba bin/micromamba
            fi
            echo "Prepared environment at $APP_DIR"
      - name: Sync repository (incremental)
        uses: appleboy/ssh-action@v1
        env:
          #REPO_TOKEN: ${{ secrets.GH_PAT_RO }}
          DEFAULT_TOKEN: ${{ secrets.GH_PAT_RO }}  # PAT with at least 'repo' scope
          GIT_LFS_SKIP_SMUDGE: 1
          REPO: Kar488/M-JEPA
          BRANCH: master
          MJEPA_DEPLOY_KEY: ${{ secrets.VAST_SSH_KEY }}   # PRIVATE key (raw text)
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,REPO,BRANCH,DEFAULT_TOKEN,MJEPA_DEPLOY_KEY
          script: |
            set -euo pipefail

            # 0) Pre-reqs (optional): ensure git-lfs exists if you use LFS
            command -v git-lfs >/dev/null || (apt-get update && apt-get install -y git-lfs)

            # 1) Write PRIVATE deploy key from secret (must begin with -----BEGIN OPENSSH PRIVATE KEY-----)
            mkdir -p ~/.ssh
            # Will error clearly if missing:
            : "${MJEPA_DEPLOY_KEY:?MJEPA_DEPLOY_KEY missing}" 
            printf '%s\n' "$MJEPA_DEPLOY_KEY" > ~/.ssh/mjepa_deploy_key 
            chmod 600 ~/.ssh/mjepa_deploy_key

            # 2) Trust GitHub host key (no prompt)
            ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> ~/.ssh/known_hosts

            # 3) (optional) pin identity for github.com
            cat >> ~/.ssh/config <<'CFG'
            Host github.com
              IdentityFile ~/.ssh/mjepa_deploy_key
              IdentitiesOnly yes
            CFG
            chmod 600 ~/.ssh/config

            # Tell git to use the deploy key when connecting to GitHub.
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/mjepa_deploy_key -o StrictHostKeyChecking=no"
            
            # Clone or update via SSH instead of HTTPS
            AUTH_URL="git@github.com:${REPO}.git"
            # AUTH_URL="https:///x-access-token:${DEFAULT_TOKEN}@github.com/${REPO}.git"

            mkdir -p "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" reset --hard HEAD
              git -C "$APP_DIR" clean -fd
              git -C "$APP_DIR" remote set-url origin "$AUTH_URL"
              # git -C "$APP_DIR" fetch --depth=1 origin "$BRANCH"
              timeout 300 git -C "$APP_DIR" fetch --progress --verbose --prune --depth=1 --filter=blob:none origin "$BRANCH"
              git -C "$APP_DIR" checkout -B "$BRANCH" "origin/$BRANCH"
            else
              # git clone --depth=1 --branch "$BRANCH" "$AUTH_URL" "$APP_DIR"
              timeout 300 git clone --depth=1 --progress --verbose --filter=blob:none "$AUTH_URL" "$APP_DIR"
              git -C "$APP_DIR" checkout "$BRANCH"
            fi

            # Define a proper LFS endpoint with your PAT
            git -C "$APP_DIR" lfs install --local || true
            git -C "$APP_DIR" config lfs.url "https://x-access-token:${DEFAULT_TOKEN}@github.com/${REPO}.git/info/lfs"
          
            # Fetch and checkout all LFS objects for this branch
            git -C "$APP_DIR" lfs pull origin "$BRANCH"
  vast_prepare_environment:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Prepare environment on Vast runner
    runs-on: self-hosted
    needs: vast_deploy
    env:
      # Preparing the environment must touch /data/mjepa so later stages inherit
      # the same mounts and permissions. Fail fast instead of redirecting to a
      # temporary path so we fix the real storage issue immediately.
      MJEPA_ALLOW_DATA_FALLBACKS: '0'
    steps:
      - name: Debug runner identity
        run: |
          echo "whoami: $(whoami)"
          echo "UID: $(id -u)"
          echo "GID: $(id -g)"
          echo "GROUP: $(id -gn)"
      - name: Ensure experiments root is writable
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"

          if bash scripts/ci/ensure_experiments_root.sh; then
            exit 0
          fi

          if ! command -v sudo >/dev/null 2>&1; then
            echo "[prepare-env][fatal] unable to fix EXPERIMENTS_ROOT without sudo" >&2
            exit 1
          fi

          echo "[prepare-env] repairing experiments root with sudo"
          runner_uid=$(id -u)
          runner_gid=$(id -g)
          repair_path="${EXPERIMENTS_ROOT:-}"
          if [[ -z "$repair_path" ]]; then
            echo "[prepare-env][fatal] EXPERIMENTS_ROOT is unset; cannot repair" >&2
            exit 1
          fi
          preserve_vars="APP_DIR,DATA_ROOT,EXPERIMENTS_ROOT,MJEPA_ALLOW_DATA_FALLBACKS,MAMBA_ROOT_PREFIX,PIP_CACHE_DIR,RUN_ID,EXP_ID,GRID_EXP_ID,PRETRAIN_EXP_ID,PRETRAIN_STATE_ID,PRETRAIN_STATE_FILE,PRETRAIN_STATE_FILE_LEGACY"
          MJEPA_DIR_OWNER_UID="$runner_uid" \
          MJEPA_DIR_OWNER_GID="$runner_gid" \
          EXPERIMENTS_ROOT="$repair_path" \
          sudo --preserve-env=${preserve_vars},MJEPA_DIR_OWNER_UID,MJEPA_DIR_OWNER_GID,MJEPA_DIR_MODE \
            bash scripts/ci/repair_experiments_root.sh

          echo "[prepare-env] verifying experiments root after sudo repair"
          bash scripts/ci/ensure_experiments_root.sh
      - name: Run prepare_env locally
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          bash scripts/ci/prepare_env.sh

  vast_cache_warm_2d:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Warm dataset cache (2D)
    runs-on: self-hosted
    timeout-minutes: 480
    needs: [vast_prepare_environment]
    env:
      MJEPA_ALLOW_DATA_FALLBACKS: '0'
    steps:
      - name: Materialise 2D caches locally
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"

          # Source the shared CI bootstrap so DATA_ROOT / micromamba fallbacks
          # mirror the behaviour of stage runners.
          source scripts/ci/common.sh
          if ! ensure_micromamba_python; then
            echo "[cache-warm][fatal] micromamba env 'mjepa' missing or broken" >&2
            exit 1
          fi
          MICROMAMBA_BIN="$MMBIN"
          CACHE_WARM_UNLABELED_DIR="${APP_DIR}/data/ZINC-canonicalized"
          CACHE_WARM_LABELED_DIR="${APP_DIR}/data/katielinkmoleculenet_benchmark/train"
          CACHE_WARM_LABEL_COL="measured log solubility in mols per litre"
          # Build the full 10M cache used by later pretraining plus the
          # Phase-1 subset and Phase-2 intermediate shard so sweep agents see
          # hits (sample size is part of the cache key, so we need every
          # variant on disk).
          CACHE_WARM_SAMPLE_UNLABELED_FULL=10000000
          CACHE_WARM_SAMPLE_UNLABELED_PHASE1=100000
          CACHE_WARM_SAMPLE_UNLABELED_PHASE2=250000
          CACHE_WARM_SAMPLE_LABELED=5000
          CACHE_WARM_NUM_WORKERS=-1

          if [ ! -x "$MICROMAMBA_BIN" ]; then
            echo "[cache-warm][fatal] micromamba not found at $MICROMAMBA_BIN" >&2
            exit 1
          fi

          # Warm the full pretrain cache first, then a Phase-1-sized cache so
          # sweep agents reuse the small shard instead of rebuilding.
          "$MICROMAMBA_BIN" run -n mjepa python scripts/ci/cache_warm_prebuilt_datasets.py \
            --unlabeled-dir "$CACHE_WARM_UNLABELED_DIR" \
            --labeled-dir "$CACHE_WARM_LABELED_DIR" \
            --label-col "$CACHE_WARM_LABEL_COL" \
            --cache-dir "$SWEEP_CACHE_DIR" \
            --sample-unlabeled "$CACHE_WARM_SAMPLE_UNLABELED_FULL" \
            --sample-labeled "$CACHE_WARM_SAMPLE_LABELED" \
            --num-workers "$CACHE_WARM_NUM_WORKERS"

          "$MICROMAMBA_BIN" run -n mjepa python scripts/ci/cache_warm_prebuilt_datasets.py \
            --unlabeled-dir "$CACHE_WARM_UNLABELED_DIR" \
            --labeled-dir "$CACHE_WARM_LABELED_DIR" \
            --label-col "$CACHE_WARM_LABEL_COL" \
            --cache-dir "$SWEEP_CACHE_DIR" \
            --sample-unlabeled "$CACHE_WARM_SAMPLE_UNLABELED_PHASE1" \
            --sample-labeled "$CACHE_WARM_SAMPLE_LABELED" \
            --num-workers "$CACHE_WARM_NUM_WORKERS"

          # Phase-2 sweeps sample a larger unlabeled shard than Phase-1, so
          # warm that intermediate cache too.
          "$MICROMAMBA_BIN" run -n mjepa python scripts/ci/cache_warm_prebuilt_datasets.py \
            --unlabeled-dir "$CACHE_WARM_UNLABELED_DIR" \
            --labeled-dir "$CACHE_WARM_LABELED_DIR" \
            --label-col "$CACHE_WARM_LABEL_COL" \
            --cache-dir "$SWEEP_CACHE_DIR" \
            --sample-unlabeled "$CACHE_WARM_SAMPLE_UNLABELED_PHASE2" \
            --sample-labeled "$CACHE_WARM_SAMPLE_LABELED" \
            --num-workers "$CACHE_WARM_NUM_WORKERS"

  vast_cache_warm_3d:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Warm dataset cache (3D)
    runs-on: self-hosted
    timeout-minutes: 1080
    needs: [vast_prepare_environment, vast_cache_warm_2d]
    env:
      MJEPA_ALLOW_DATA_FALLBACKS: '0'
      HARD_WALL_MINS: 1080
      KILL_AFTER_SECS: 120
    steps:
      - name: Materialise 3D caches locally
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"

          # Mirror the 2D warmer setup so both stages share the fallback
          # handling implemented in scripts/ci/common.sh.
          source scripts/ci/common.sh
          if ! ensure_micromamba_python; then
            echo "[cache-warm][fatal] micromamba env 'mjepa' missing or broken" >&2
            exit 1
          fi
          MICROMAMBA_BIN="$MMBIN"
          CACHE_WARM_UNLABELED_DIR="${APP_DIR}/data/ZINC-canonicalized"
          CACHE_WARM_LABELED_DIR="${APP_DIR}/data/katielinkmoleculenet_benchmark/train"
          CACHE_WARM_LABEL_COL="measured log solubility in mols per litre"
          # Build the full 10M cache used by later pretraining plus the
          # Phase-1 subset and Phase-2 intermediate shard so sweep agents see
          # hits (sample size is part of the cache key, so we need every
          # variant on disk).
          CACHE_WARM_SAMPLE_UNLABELED_FULL=10000000
          CACHE_WARM_SAMPLE_UNLABELED_PHASE1=100000
          CACHE_WARM_SAMPLE_UNLABELED_PHASE2=250000
          CACHE_WARM_SAMPLE_LABELED=5000
          CACHE_WARM_NUM_WORKERS=-1

          if [ ! -x "$MICROMAMBA_BIN" ]; then
            echo "[cache-warm][fatal] micromamba not found at $MICROMAMBA_BIN" >&2
            exit 1
          fi

          SOFT_WALL_SECS=$(( HARD_WALL_MINS * 60 ))
          # Warm the full pretrain cache first, then a Phase-1-sized cache so
          # sweep agents reuse the small shard instead of rebuilding.
          "$MICROMAMBA_BIN" run -n mjepa timeout --signal=SIGTERM --kill-after="$KILL_AFTER_SECS" "$SOFT_WALL_SECS" \
            python scripts/ci/cache_warm_prebuilt_datasets.py \
              --unlabeled-dir "$CACHE_WARM_UNLABELED_DIR" \
              --labeled-dir "$CACHE_WARM_LABELED_DIR" \
              --label-col "$CACHE_WARM_LABEL_COL" \
              --cache-dir "$SWEEP_CACHE_DIR" \
              --sample-unlabeled "$CACHE_WARM_SAMPLE_UNLABELED_FULL" \
              --sample-labeled "$CACHE_WARM_SAMPLE_LABELED" \
              --num-workers "$CACHE_WARM_NUM_WORKERS" \
              --add-3d

          "$MICROMAMBA_BIN" run -n mjepa timeout --signal=SIGTERM --kill-after="$KILL_AFTER_SECS" "$SOFT_WALL_SECS" \
            python scripts/ci/cache_warm_prebuilt_datasets.py \
              --unlabeled-dir "$CACHE_WARM_UNLABELED_DIR" \
              --labeled-dir "$CACHE_WARM_LABELED_DIR" \
              --label-col "$CACHE_WARM_LABEL_COL" \
              --cache-dir "$SWEEP_CACHE_DIR" \
              --sample-unlabeled "$CACHE_WARM_SAMPLE_UNLABELED_PHASE1" \
              --sample-labeled "$CACHE_WARM_SAMPLE_LABELED" \
              --num-workers "$CACHE_WARM_NUM_WORKERS" \
              --add-3d

          # Phase-2 sweeps sample a larger unlabeled shard than Phase-1, so
          # warm that intermediate cache too.
          "$MICROMAMBA_BIN" run -n mjepa timeout --signal=SIGTERM --kill-after="$KILL_AFTER_SECS" "$SOFT_WALL_SECS" \
            python scripts/ci/cache_warm_prebuilt_datasets.py \
              --unlabeled-dir "$CACHE_WARM_UNLABELED_DIR" \
              --labeled-dir "$CACHE_WARM_LABELED_DIR" \
              --label-col "$CACHE_WARM_LABEL_COL" \
              --cache-dir "$SWEEP_CACHE_DIR" \
              --sample-unlabeled "$CACHE_WARM_SAMPLE_UNLABELED_PHASE2" \
              --sample-labeled "$CACHE_WARM_SAMPLE_LABELED" \
              --num-workers "$CACHE_WARM_NUM_WORKERS" \
              --add-3d

  vast_learn_hyperparameters:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Learn hyperparameters (Custom or WandB)
    runs-on: self-hosted #ubuntu-latest
    timeout-minutes: 3860
    needs: [tests_quick,vast_prepare_environment,vast_cache_warm_2d,vast_cache_warm_3d]
    env:
      MJEPA_ALLOW_DATA_FALLBACKS: '0'
    outputs:
      grid_exp_id: ${{ steps.phase1_ids.outputs.grid_exp_id }}
      pretrain_exp_id: ${{ steps.phase1_ids.outputs.pretrain_exp_id }}
    steps:
      - name: Ensure experiments root available
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          bash scripts/ci/ensure_experiments_root.sh
      - name: Run grid search
        env:
          HARD_WALL_MINS: 3500
          KILL_AFTER_SECS: 120
          # Set matching backbone/seed combinations so JEPA & contrastive sweeps stay paired.
          WANDB_COUNT: 3
          GRID_MODE: "wandb"   # or "custom"
          EXPORT_OUT_PATH: ${{ env.GRID_DIR }}/best_grid_config.json
          EXPORT_PHASE2_PATH: ${{ env.GRID_DIR }}/grid_sweep_phase2.yaml
          PHASE2_UNLABELED_DIR: ${{ env.APP_DIR }}/data/ZINC-canonicalized
          PHASE2_LABELED_DIR:  ${{ env.APP_DIR }}/data/katielinkmoleculenet_benchmark/train
          PE_MIN_PRETRAIN_EPOCHS: 5
          PE_MIN_FINETUNE_EPOCHS: 1
          PE_MIN_PRETRAIN_BATCHES: 200
          # W&B sweeps pair runs via PHASE1_BACKBONES/PHASE1_SEEDS; PHASE1_SWEEP_SEED is deprecated.
          PHASE1_BACKBONES: gine,dmpnn,schnet3d
          PHASE1_SEEDS: 1,2,3,4,5
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          bash scripts/ci/run-grid-or-phase1.sh
      - name: Checkout helper scripts
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts/ci
          sparse-checkout-cone-mode: false
      # Capture lineage ids after Phase-1 so subsequent jobs reuse the correct slots.
      - name: Resolve Phase-1 lineage identifiers
        id: phase1_ids
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
          APP_DIR: ${{ env.APP_DIR }}
          EXPERIMENTS_ROOT: ${{ env.EXPERIMENTS_ROOT }}
          RUN_ID: ${{ github.run_id }}
        run: bash scripts/ci/publish_phase1_lineage.sh
      - name: Collect Phase-1 artifacts
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
          EXP_ID: ${{ env.EXP_ID || steps.phase1_ids.outputs.grid_exp_id || github.run_id }}
          GRID_EXP_ID: ${{ env.GRID_EXP_ID || steps.phase1_ids.outputs.grid_exp_id || github.run_id }}
          EXPERIMENTS_ROOT: ${{ env.EXPERIMENTS_ROOT }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: bash scripts/ci/collect-phase1-artifacts.sh "$RUNNER_TEMP/phase1"
      - name: Upload Phase-1 sweep logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase1-logs
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase1/logs
            ${{ runner.temp }}/phase1/current/phase1/logs
            ${{ runner.temp }}/phase1/lineage/phase1/logs
      - name: Upload Phase-1 export outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase1-export
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase1/phase1_export
            ${{ runner.temp }}/phase1/current/phase1_export
            ${{ runner.temp }}/phase1/lineage/phase1_export
  # Option X: keep a single Vast job running sweep → recheck → export sequentially.
  vast_sweep_phase2:
    if: ${{ ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) && ((github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb') == 'wandb') }}
    name: Phase 2 (sweep → recheck → export)
    runs-on: self-hosted #ubuntu-latest
    timeout-minutes: 3860
    needs: vast_learn_hyperparameters
    concurrency:
      group: phase2-${{ github.ref }}-${{ github.run_id }}
      cancel-in-progress: true
    env:
      RUN_ID: ${{ github.run_id }}
      EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      GRID_EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.pretrain_exp_id || needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      PHASE2_SWEEP_WALL_MINS: 3500
      PHASE2_RECHECK_WALL_MINS: 1500
      PHASE2_EXPORT_WALL_MINS: 1500
      MJEPA_ALLOW_DATA_FALLBACKS: '0'
    steps:
      - name: Ensure experiments root available
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          bash scripts/ci/ensure_experiments_root.sh
      - name: Run Phase-2 stages on Vast
        env:
          # agent knobs (already have these)
          HARD_WALL_MINS: ${{ env.PHASE2_SWEEP_WALL_MINS }}
          KILL_AFTER_SECS: 120
          WANDB_COUNT: 8
          # recheck knobs (separate budget)
          TOPK_RECHECK: 5
          EXTRA_SEEDS: 3
          PHASE2_METRIC: val_rmse
          PHASE2_DIRECTION: min
          PHASE2_UNLABELED_DIR: ${{ env.APP_DIR }}/data/ZINC-canonicalized
          PHASE2_LABELED_DIR:  ${{ env.APP_DIR }}/data/katielinkmoleculenet_benchmark/train
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          bash scripts/ci/run-grid-phase2.sh

      # Run on the GitHub runner so helper scripts referenced below are available
      # locally; this does not affect the remote Vast execution.
      - name: Checkout repository for artifact collection
        if: always()
        uses: actions/checkout@v4

      - name: Collect Phase-2 artifacts
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
          EXP_ID: ${{ env.EXP_ID }}
          EXPERIMENTS_ROOT: ${{ env.EXPERIMENTS_ROOT }}
          RUNNER_TEMP: ${{ runner.temp }}
          # run-grid-phase2.sh already runs sweep → recheck → export on the Vast host.
          # Artifact collection only validates that the recheck outputs exist.
          REQUIRE_PHASE2_RECHECK: "1"
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" && ls -la "$GITHUB_WORKSPACE" || true
          ls -la "$GITHUB_WORKSPACE/scripts/ci" || true
          test -f "$GITHUB_WORKSPACE/scripts/ci/collect-phase2-artifacts.sh" && echo "collector=present" || echo "collector=missing"
          bash "$GITHUB_WORKSPACE/scripts/ci/collect-phase2-artifacts.sh" "$RUNNER_TEMP/phase2"

      - name: Upload Phase-2 sweep logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase2-sweep
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase2/current/phase2_sweep
            ${{ runner.temp }}/phase2/lineage/phase2_sweep
            ${{ runner.temp }}/phase2/phase2_sweep

      - name: Upload Phase-2 recheck logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase2-recheck
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase2/current/phase2_recheck
            ${{ runner.temp }}/phase2/lineage/phase2_recheck
            ${{ runner.temp }}/phase2/phase2_recheck

      - name: Upload Phase-2 export logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase2-export
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase2/current/phase2_export
            ${{ runner.temp }}/phase2/lineage/phase2_export
            ${{ runner.temp }}/phase2/phase2_export

      - name: Upload Phase-2 grid outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase2-grid
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase2/current/grid
            ${{ runner.temp }}/phase2/lineage/grid
            ${{ runner.temp }}/phase2/grid

  vast_pretrain:
    name: Pretain Model
    runs-on: self-hosted #ubuntu-latest
    timeout-minutes: 2860
    needs: [vast_learn_hyperparameters, vast_sweep_phase2]
    if: ${{ ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) && ( ((github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb') == 'wandb' && needs.vast_sweep_phase2.result == 'success') || ((github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb') == 'custom' && needs.vast_learn_hyperparameters.result == 'success') ) }}
    env:
      EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      GRID_EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.pretrain_exp_id || needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      MJEPA_ALLOW_DATA_FALLBACKS: '0'
    outputs:
      exp_id: ${{ steps.pretrain_state.outputs.exp_id }}
      pretrain_root: ${{ steps.pretrain_state.outputs.experiment_root }}
      pretrain_manifest: ${{ steps.pretrain_state.outputs.manifest_path }}
      pretrain_encoder: ${{ steps.pretrain_state.outputs.encoder_path }}
      pretrain_tox21_env: ${{ steps.pretrain_state.outputs.tox21_env }}
    steps:
      - name: Ensure experiments root available
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          bash scripts/ci/ensure_experiments_root.sh
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pretrain on Vast
        env:
          HARD_WALL_MINS: 3500
          KILL_AFTER_SECS: 120
          PRETRAIN_EPOCHS: "70"
          FINETUNE_EPOCHS: "8"
          BESTCFG_NO_EPOCHS: "1"
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          bash scripts/ci/run-pretrain.sh

      - name: Fetch pretrain state snapshot
        id: pretrain_state
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
          EXPERIMENTS_ROOT: ${{ env.EXPERIMENTS_ROOT }}
        run: bash "$GITHUB_WORKSPACE/scripts/ci/fetch-pretrain-state.sh" pretrain_artifacts

      - name: Collect pretrain artifacts
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
        run: bash "$GITHUB_WORKSPACE/scripts/ci/collect-pretrain-artifacts.sh" pretrain_artifacts

      - name: Upload pretrain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-pretrain-artifacts
          if-no-files-found: ignore
          path: pretrain_artifacts

  vast_tox21_baseline:
    name: Tox21 Baseline
    runs-on: self-hosted #ubuntu-latest
    timeout-minutes: 3860
    needs: vast_pretrain
    if: ${{ ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) && needs.vast_pretrain.result == 'success' }}
    outputs:
      tox21_gate: ${{ steps.tox21_gate.outputs.value }}
    env:
      EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXPERIMENT_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      EXP_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      PRETRAIN_MANIFEST: ${{ needs.vast_pretrain.outputs.pretrain_manifest }}
      PRETRAIN_ENCODER_PATH: ${{ needs.vast_pretrain.outputs.pretrain_encoder }}
      PRETRAIN_TOX21_ENV: ${{ needs.vast_pretrain.outputs.pretrain_tox21_env }}
      PRETRAIN_STATE_FILE: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      PRETRAIN_STATE_FILE_CANONICAL: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      EXPERIMENTS_ROOT: /data/mjepa/experiments
      TOX21_EXPLAIN_MODE: ig
    steps:
      - name: Ensure experiments root available
        shell: bash
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          bash scripts/ci/ensure_experiments_root.sh
      - name: Tox21 baseline on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 1500m
          envs: APP_DIR,GRID_DIR,TOX21_DIR,MAMBA_ROOT_PREFIX,PYTHONPATH,LOG_DIR,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,
            PRETRAIN_EPOCHS,FINETUNE_EPOCHS,SSH_KEY,VAST_HOST,VAST_USER,VAST_PORT,
            BESTCFG_NO_EPOCHS,TOX21_ENCODER_SOURCE,EXP_ID,PRETRAIN_EXP_ID,PRETRAIN_EXPERIMENT_ROOT,PRETRAIN_MANIFEST,PRETRAIN_STATE_FILE,PRETRAIN_STATE_FILE_CANONICAL,PRETRAIN_TOX21_ENV,PRETRAIN_ENCODER_PATH,EXPERIMENTS_ROOT,TOX21_EXPLAIN_MODE,TOX21_EXPLAIN_STEPS
          script: |
            bash "$APP_DIR/scripts/ci/run-tox21.sh"
        env:
          HARD_WALL_MINS: 3500
          KILL_AFTER_SECS: 120
          PRETRAIN_EPOCHS: "70"
          FINETUNE_EPOCHS: "18"
          BESTCFG_NO_EPOCHS: "1"
          TOX21_ENCODER_SOURCE: pretrain_frozen

      - name: Checkout repository for tox21 baseline artifacts
        if: always()
        uses: actions/checkout@v4

      - name: Collect tox21 baseline outputs
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
          EXP_ID: ${{ env.EXP_ID }}
          PRETRAIN_EXP_ID: ${{ env.PRETRAIN_EXP_ID }}
          EXP_ROOT: ${{ env.EXP_ROOT }}
          EXPERIMENTS_ROOT: ${{ env.EXPERIMENTS_ROOT }}
        run: |
          bash "$GITHUB_WORKSPACE/scripts/ci/collect-tox21-artifacts.sh" baseline "$GITHUB_WORKSPACE/tox21_baseline_outputs"

      - name: Upload tox21 baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-tox21-baseline
          if-no-files-found: warn
          path: tox21_baseline_outputs

      - name: Derive tox21 gate status
        if: always()
        id: tox21_gate
        run: |
          set -euo pipefail
          value=false
          gate_file=""
          for candidate in \
            "tox21_baseline_outputs/baseline/tox21_gate.env" \
            "tox21_baseline_outputs/tox21_gate.env"; do
            if [ -f "$candidate" ]; then
              gate_file="$candidate"
              break
            fi
          done
          if [ -n "$gate_file" ]; then
            raw=$(grep -E '^TOX21_MET_GATE=' "$gate_file" | tail -n1 | cut -d'=' -f2-)
            if [ -n "$raw" ]; then
              raw=$(echo "$raw" | tr '[:upper:]' '[:lower:]')
              if [[ "$raw" == "true" ]]; then
                value=true
              fi
            fi
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "TOX21_MET_GATE=$value" >> "$GITHUB_ENV"

