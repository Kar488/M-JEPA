# .github/workflows/ci-vast.yml
name: CI → Vast GPU

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: {}

concurrency:
  group: vast-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /srv/mjepa
  VENV_DIR: /srv/mjepa/.venv
  PIP_CACHE_DIR: /srv/mjepa/.cache/pip

jobs:
  tests_quick:
    name: Quick tests (no gpu, no slow)
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps: 
      - uses: actions/checkout@v4
        # if you use submodules, add:
        # with:
        #   submodules: recursive
        #   fetch-depth: 0

      - name: Set up Miniconda (with mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.10"
          activate-environment: ml
          channels: conda-forge
          channel-priority: strict
          miniforge-version: latest
          use-mamba: true

      - name: Install RDKit (conda)
        shell: bash -l {0}
        run: |
            mamba install -y python=3.10 rdkit
      
      - name: Set versions (for cache key)
        run: |
          echo "TORCH_VER=2.2.1" >> $GITHUB_ENV
          echo "TSCATTER_VER=2.1.2" >> $GITHUB_ENV

      - name: Define cache dirs
        run: echo "PIP_CACHE=${GITHUB_WORKSPACE}/.pip-cache" >> $GITHUB_ENV

      - name: Prepare pip cache dir
        run: mkdir -p "$PIP_CACHE"
                            
      - name: Cache pip (CI)
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE }} # <-- use the same dir we created
          key: pip-${{ runner.os }}-py3.10-torch${{ env.TORCH_VER }}-tscatter${{ env.TSCATTER_VER }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.10-

      - name: Install deps (CPU, in your order)
        shell: bash -l {0}
        env:
            PIP_CACHE_DIR: ${{ env.PIP_CACHE }} # <-- use the same dir we created
        run: |
          python -m pip install --upgrade pip setuptools wheel "numpy<2"
          pip install "torch==2.2.1" --index-url https://download.pytorch.org/whl/cpu
          pip install "torch-scatter==2.1.2" -f https://data.pyg.org/whl/torch-2.2.1+cpu.html
          pip install torch-geometric
          [ -f requirements.txt ] && pip install -r requirements.txt

      - name: Show pip cache dir
        shell: bash -l {0}
        env:
            PIP_CACHE_DIR: ${{ env.PIP_CACHE }}
        run: pip cache dir
      
      - name: Run quick tests
        shell: bash -l {0}
        run: pytest -m "not gpu and not slow"

  # tests_slow:
    # Future enhancements to long running tests locally
      #- name: Run slow tests
      #  run: |
      #    pytest tests -m "slow and not gpu"

  vast_smoke:
    name: Smoke on Vast (GPU present?)
    runs-on: ubuntu-latest
    needs: tests_quick
    steps:
      - name: GPU sanity
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}   # leave secret empty if no passphrase
          script: |
            set -e
            nvidia-smi
            python3 - <<'PY' || true
            import torch
            print("torch:", getattr(torch,"__version__",None))
            print("cuda available:", torch.cuda.is_available())
            PY

  vast_deploy_and_train:
    name: Deploy + Train on Vast
    runs-on: ubuntu-latest
    needs: [tests_quick, vast_smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          REPO_DEPLOY_KEY: ${{ secrets.REPO_DEPLOY_KEY }}  # private key contents
          REPO: Kar488/M-JEPA
          APP_DIR: /srv/mjepa
          BRANCH: master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: REPO_DEPLOY_KEY,REPO,APP_DIR,BRANCH
          script: |
            set -euo pipefail

            # 1) Prepare SSH for GitHub
            mkdir -p ~/.ssh
            umask 077
            printf '%s\n' "$REPO_DEPLOY_KEY" > ~/.ssh/id_github
            chmod 600 ~/.ssh/id_github
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            # 2) Delta deploy
            mkdir -p "$APP_DIR"
            export GIT_SSH_COMMAND='ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=yes'

            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" fetch --prune --tags --depth=50
              git -C "$APP_DIR" checkout "$BRANCH"
              git -C "$APP_DIR" pull --ff-only
            else
              git clone --depth=50 "git@github.com:${REPO}.git" "$APP_DIR"
              git -C "$APP_DIR" checkout "$BRANCH"
            fi

            # 3) (Optional) Clean up the private key if you don't want it persisted
            # shred -u ~/.ssh/id_github || true

            unset REPO_DEPLOY_KEY

      # Separate deployment phases: pretrain, finetune, benchmark and case study
      - name: Pretrain on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            nvidia-smi
            mkdir -p logs outputs
            # Pretraining stage
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py pretrain \
              --unlabeled-dir data/BASF_AIPubChem_v4 \
              --epochs 1 \
              --batch-size 4 \
              --contrastive \
              --output outputs/encoder.pt \
              --use-wandb \
              --config default.yaml \
              2>&1 | tee -a logs/pretrain_$(date +%F_%H-%M).log

      - name: Finetune on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            mkdir -p logs
            # Finetune stage
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py finetune \
              --labeled-dir data/katielinkmoleculenet_benchmark/train \
              --encoder outputs/encoder.pt \
              --task-type classification \
              --epochs 1 \
              --batch-size 4 \
              --patience 10 \
              --use-wandb \
              --config default.yaml \
              2>&1 | tee -a logs/finetune_$(date +%F_%H-%M).log

      - name: Benchmark on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            mkdir -p logs
            # Benchmark stage
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py benchmark \
              --labeled-dir data/katielinkmoleculenet_benchmark/train \
              --jepa-encoder outputs/encoder.pt \
              --contrastive-encoder outputs/encoder_contrastive.pt \
              --task-type classification \
              --epochs 1 \
              --batch-size 4 \
              --patience 10 \
              --use-wandb \
              --config default.yaml \
              2>&1 | tee -a logs/benchmark_$(date +%F_%H-%M).log

      - name: Tox21 case study on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            mkdir -p logs
            # Case study stage
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              train_jepa.py tox21 \
              --csv data/tox21/data.csv \
              --task NR-AR \
              --pretrain-epochs 1 \
              --finetune-epochs 1 \
              --num-top-exclude 5 \
              --use-wandb \
              --config default.yaml \
              2>&1 | tee -a logs/tox21_$(date +%F_%H-%M).log

