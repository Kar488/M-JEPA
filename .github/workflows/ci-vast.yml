# .github/workflows/ci-vast.yml
name: CI → Vast GPU

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: {}

concurrency:
  group: vast-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /srv/mjepa
  VENV_DIR: /srv/mjepa/.venv
  PIP_CACHE_DIR: /srv/mjepa/.cache/pip

jobs:
  tests_quick:
    name: Quick tests (no gpu, no slow)
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps: 
      - uses: actions/checkout@v4
        # if you use submodules, add:
        # with:
        #   submodules: recursive
        #   fetch-depth: 0

      - name: Set up Miniconda (with mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.10"
          activate-environment: ml
          channels: conda-forge
          channel-priority: strict
          miniforge-version: latest
          use-mamba: true

      - name: Install RDKit (conda)
        shell: bash -l {0}
        run: |
            mamba install -y python=3.10 rdkit

      - name: Set versions (for cache key)
        run: |
          echo "TORCH_VER=2.2.1" >> $GITHUB_ENV
          echo "TSCATTER_VER=2.1.2" >> $GITHUB_ENV

      - name: Cache pip (CI)
        uses: actions/cache@v4
        with:
          path: ${{ env.HOME }}/.cache/pip
          key: pip-${{ runner.os }}-py3.10-torch${{ env.TORCH_VER }}-tscatter${{ env.TSCATTER_VER }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.10-

      - name: Install deps (CPU, in your order)
        shell: bash -l {0}
        env:
            PIP_CACHE_DIR: ${{ env.HOME }}/.cache/pip
        run: |
          python -m pip install --upgrade pip setuptools wheel "numpy<2"
          pip install "torch==2.2.1" --index-url https://download.pytorch.org/whl/cpu
          pip install "torch-scatter==2.1.2" -f https://data.pyg.org/whl/torch-2.2.1+cpu.html
          pip install torch-geometric
          [ -f requirements.txt ] && pip install -r requirements.txt

      - name: Run quick tests
        shell: bash -l {0}
        run: pytest -m "not gpu and not slow"

  # tests_slow:
    # Future enhancements to long running tests locally
      #- name: Run slow tests
      #  run: |
      #    pytest tests -m "slow and not gpu"

  vast_smoke:
    name: Smoke on Vast (GPU present?)
    runs-on: ubuntu-latest
    needs: tests_quick
    steps:
      - name: GPU sanity
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}   # leave secret empty if no passphrase
          script: |
            set -e
            nvidia-smi
            python3 - <<'PY' || true
            import torch
            print("torch:", getattr(torch,"__version__",None))
            print("cuda available:", torch.cuda.is_available())
            PY

  vast_deploy_and_train:
    name: Deploy + Train on Vast
    runs-on: ubuntu-latest
    needs: [tests_quick, vast_smoke]
    steps:
      - uses: actions/checkout@v4

      # OPTION A (delta): pull via git on Vast (requires a GitHub deploy key on Vast at ~/.ssh/id_github)
      - name: Update code on Vast (git pull)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}   # leave secret empty if no passphrase
          script: |
            set -euxo pipefail
            mkdir -p "$APP_DIR"
            if [ -d "$APP_DIR/.git" ]; then
              GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=no" \
                git -C "$APP_DIR" fetch --all
              GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=no" \
                git -C "$APP_DIR" reset --hard origin/main
            else
              GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=no" \
                git clone git@github.com:<YOUR_ORG>/<YOUR_REPO>.git "$APP_DIR"
            fi
            # if you use submodules:
            if [ -f "$APP_DIR/.gitmodules" ]; then
              GIT_SSH_COMMAND="ssh -i ~/.ssh/id_github -o StrictHostKeyChecking=no" \
                git -C "$APP_DIR" submodule update --init --recursive
            fi

      # OPTION B (simple, not delta): use SCP instead of git pull
      # - name: Upload code to Vast (SCP)
      #   uses: appleboy/scp-action@v1
      #   with:
      #     host: ${{ secrets.VAST_HOST }}
      #     username: ${{ secrets.VAST_USER }}
      #     port: ${{ secrets.VAST_PORT }}
      #     key: ${{ secrets.VAST_SSH_KEY }}
      #     source: ".,!.git,!.github,!.pytest_cache,!**/__pycache__,!**/.ipynb_checkpoints"
      #     target: "/srv/mjepa"
      #     rm: true
      #     overwrite: true

      - name: Prepare venv on Vast (reuse if deps unchanged)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            cd "$APP_DIR"
            mkdir -p "$PIP_CACHE_DIR"

            # hash your dependency files (add more if needed)
            DEPS=("requirements.txt" "pyproject.toml" "setup.cfg")
            HASH=$( (for f in "${DEPS[@]}"; do [ -f "$f" ] && sha256sum "$f"; done) | sha256sum | cut -d' ' -f1 )
            echo "deps hash: $HASH"

            if [ -d "$VENV_DIR-$HASH" ]; then
              ln -snf "$VENV_DIR-$HASH" "$VENV_DIR"
            else
              python3 -m venv "$VENV_DIR-$HASH"
              ln -snf "$VENV_DIR-$HASH" "$VENV_DIR"
              . "$VENV_DIR/bin/activate"
              python -m pip install -U pip wheel
              # CUDA wheels on Vast (adjust cu version if needed)
              pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
              pip install torch-scatter torch-sparse torch-cluster torch-spline-conv \
                -f https://data.pyg.org/whl/torch-2.2.1+cu121.html
              pip install torch-geometric
              [ -f requirements.txt ] && pip install -r requirements.txt
            fi

      - name: Train on Vast (attached)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          script: |
            set -euxo pipefail
            export WANDB_API_KEY='${{ secrets.WANDB_API_KEY }}'
            cd "$APP_DIR"
            . "$VENV_DIR/bin/activate"
            nvidia-smi
            torchrun --standalone --nnodes=1 --nproc_per_node=1 \
              scripts/train_jepa.py --config configs/default.yaml --patience 10 2>&1 | tee -a logs/train_$(date +%F_%H-%M).log
