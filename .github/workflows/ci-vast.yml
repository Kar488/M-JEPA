# .github/workflows/ci-vast.yml
name: CI → Vast GPU

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Ignore cached outputs"
        required: false
        default: "true"
      run_unit_tests:
        description: "Run unit tests"
        required: false
        default: "true"
      run_vast_jobs:
        description: "Run Vast deployment and training jobs"
        required: false
        default: "true"
      grid_cache_dir:
        description: "Override grid cache directory"
        required: false
        default: ""
      pretrain_cache_dir:
        description: "Override pretrain cache directory"
        required: false
        default: ""
      finetune_cache_dir:
        description: "Override finetune cache directory"
        required: false
        default: ""
      bench_cache_dir:
        description: "Override benchmark cache directory"
        required: false
        default: ""
      tox21_cache_dir:
        description: "Override tox21 cache directory"
        required: false
        default: ""
      hyperparam_mode:
        description: "Which hyperparameter search strategy to use"
        required: false
        default: "custom"
        type: choice
        options:
          - custom
          - wandb

concurrency:
  group: vast-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /srv/mjepa
  VENV_DIR: /srv/mjepa/.venv
  PIP_CACHE_DIR: /data/mjepa/.pip-cache
  FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
  WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
  WANDB_ENTITY: karthik-iyer-la-trobe-university
  WANDB_PROJECT: m-jepa
  WANDB_RUN_ID: ${{ github.run_id }}
  WANDB_RESUME: allow
  WANDB_RUN_GROUP: ${{ github.run_id }}
  MAMBA_ROOT_PREFIX: /data/mjepa/micromamba
  WANDB_DIR: /data/mjepa/wandb
  WANDB_SWEEP_ID1: jnx2hxkj
  WANDB_SWEEP_ID2: 0sx3pu41
  WANDB_COUNT: 30
  HARD_WALL_MINS: 120
  KILL_AFTER_SECS: 120
  GRID_MODE: wandb
  CACHE_DIR: /data/mjepa/cache/graphs
  RUN_ID: ${{ github.run_id }}
  EXP_ROOT: /data/mjepa/experiments/${{ github.run_id }}
  GRID_DIR: /data/mjepa/experiments/${{ github.run_id }}/grid
  PRETRAIN_DIR: /data/mjepa/experiments/${{ github.run_id }}/pretrain
  FINETUNE_DIR: /data/mjepa/experiments/${{ github.run_id }}/finetune
  BENCH_DIR: /data/mjepa/experiments/${{ github.run_id }}/bench
  TOX21_DIR: /data/mjepa/experiments/${{ github.run_id }}/tox21
  LOG_DIR: /data/mjepa/experiments/${{ github.run_id }}/logs
  # as such this cache is used inside a single run only
  #Changing cache to be used across runs, change to fixed directory e.g. /data/mjepa/cache/grid
  # either delete stamp (rm /data/mjepa/cache/grid/.stamp) or point to empty directory ("") for forced reruns 
  # GRID_CACHE_DIR: ${{ github.event.inputs.grid_cache_dir || '' }}
  # PRETRAIN_CACHE_DIR: ${{ github.event.inputs.pretrain_cache_dir || '' }}
  # FINETUNE_CACHE_DIR: ${{ github.event.inputs.finetune_cache_dir || '' }}
  # BENCH_CACHE_DIR: ${{ github.event.inputs.bench_cache_dir || '' }}
  # TOX21_CACHE_DIR: ${{ github.event.inputs.tox21_cache_dir || '' }}
  GRID_CACHE_DIR: /data/mjepa/cache/grid
  PRETRAIN_CACHE_DIR: /data/mjepa/cache/pretrain
  FINETUNE_CACHE_DIR: /data/mjepa/cache/finetune
  BENCH_CACHE_DIR: /data/mjepa/cache/bench
  TOX21_CACHE_DIR: /data/mjepa/cache/tox21

jobs:
  tests_quick:
    if: ${{ github.event.inputs.run_unit_tests != 'false' }}
    name: Quick tests (no gpu, no slow)
    runs-on: ubuntu-latest
    env:
      MAMBA_ROOT_PREFIX: ~/micromamba
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: mjepa
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=3.10 rdkit=2023.09.5 scipy pip
      - name: Install deps
        run: |
          micromamba run -n mjepa python -m pip install --no-deps deepchem==2.8.0
          micromamba run -n mjepa python -m pip install --upgrade pip setuptools wheel "numpy<2"
          micromamba run -n mjepa python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.1
          micromamba run -n mjepa python -m pip install --no-cache-dir -f https://data.pyg.org/whl/torch-2.2.1+cpu.html torch-scatter==2.1.2
          micromamba run -n mjepa python -m pip install torch-geometric==2.5.3
          micromamba run -n mjepa python -m pip install -r requirements.txt
      - name: Verify installs
        run: |
          micromamba run -n mjepa python - <<'PY'
          import torch, rdkit, deepchem, torch_scatter, torch_geometric
          print('torch', torch.__version__)
          print('cuda', torch.cuda.is_available())
          from rdkit import Chem
          print('rdkit', rdkit.__version__)
          print('deepchem', deepchem.__version__)
          print('torch_scatter', torch_scatter.__version__)
          print('torch_geometric', torch_geometric.__version__)
          PY
      - name: Run tests
        run: micromamba run -n mjepa python -m pytest -m "not gpu and not slow" -q

  vast_smoke:
    if: ${{ github.event.inputs.run_vast_jobs != 'false' }}
    name: Smoke on Vast (GPU present?)
    runs-on: ubuntu-latest
    steps:
      - name: GPU sanity
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          script: |
            set -e
            whoami
            nvidia-smi
            python3 - <<'PY' || true
            import torch
            print('torch:', torch.__version__)
            print('cuda available:', torch.cuda.is_available())
            PY

  vast_deploy_and_prepare_environment:
    if: ${{ github.event.inputs.run_vast_jobs != 'false' }}
    name: Deploy + Prepare environment
    runs-on: ubuntu-latest
    needs: vast_smoke
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1
      - name: Bootstrap environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,MAMBA_ROOT_PREFIX
          script: |
            set -e
            mkdir -p "$APP_DIR"
            if [ ! -x "/data/mjepa/micromamba/bin/micromamba" ]; then
              mkdir -p /data/mjepa/micromamba
              curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest \
                | tar -xj -C /data/mjepa/micromamba bin/micromamba
            fi
            echo "Prepared environment at $APP_DIR"
      - name: Sync repository (incremental)
        uses: appleboy/ssh-action@v1
        env:
          REPO_TOKEN: ${{ secrets.GH_PAT_RO }}
          DEFAULT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: Kar488/M-JEPA
          BRANCH: master
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,REPO_TOKEN,REPO,BRANCH,DEFAULT_TOKEN
          script: |
            set -euo pipefail
            AUTH_URL="https:///x-access-token:${DEFAULT_TOKEN}@github.com/${REPO}.git"
            mkdir -p "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"
            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" remote set-url origin "$AUTH_URL"
              timeout 300 git -C "$APP_DIR" fetch --progress --verbose --prune --depth=1 --filter=blob:none origin "$BRANCH"
              git -C "$APP_DIR" checkout -B "$BRANCH" "origin/$BRANCH"
            else
              timeout 300 git clone --depth=1 --progress --verbose --filter=blob:none "$AUTH_URL" "$APP_DIR"
              git -C "$APP_DIR" checkout "$BRANCH"
            fi
            git -C "$APP_DIR" lfs pull
      - name: Setup micromamba environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,MAMBA_ROOT_PREFIX,PIP_CACHE_DIR,WANDB_DIR,CACHE_DIR,EXP_ROOT,RUN_ID
          script: |
            set -e
            cd "$APP_DIR"
            bash scripts/ci/prepare_env.sh

  vast_learn_hyperparameters:
    if: ${{ github.event.inputs.run_vast_jobs != 'false' }}
    name: Learn hyperparameters (Custom or WandB)
    runs-on: ubuntu-latest
    needs: [tests_quick,vast_deploy_and_prepare_environment]
    steps:
      - name: Run grid search
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 280m
          envs: APP_DIR,GRID_CACHE_DIR,PRETRAIN_CACHE_DIR,FINETUNE_CACHE_DIR,BENCH_CACHE_DIR,TOX21_CACHE_DIR,MAMBA_ROOT_PREFIX,PYTHONPATH,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,WANDB_ENTITY,WANDB_SWEEP_ID1,
            GRID_MODE,HARD_WALL_MINS,KILL_AFTER_SECS,WANDB_COUNT
          script: |
            bash "$APP_DIR/scripts/ci/run-grid.sh"
        env:
          HARD_WALL_MINS: 270
          KILL_AFTER_SECS: 120
          WANDB_COUNT: 30
          GRID_MODE: "wandb"   # or "custom"

  
  wandb_retrieve_best_hyperparameters:
    if: ${{ github.event.inputs.hyperparam_mode == 'wandb' }}
    name: Export best config from Phase 1 W&B sweep
    runs-on: ubuntu-latest
    needs: vast_learn_hyperparameters
    steps:
      - name: Export best config from W&B Phase 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,GRID_DIR,WANDB_API_KEY,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,WANDB_ENTITY,WANDB_SWEEP_ID1,GRID_DIR,
            GRID_MODE,WANDB_COUNT
          script: |
            cd $APP_DIR
            python scripts/ci/export_best_from_wandb.py \
              --metric val_loss \
              --out ${GRID_DIR}/best_grid_config.json

  vast_sweep_phase2:
    if: ${{ github.event.inputs.hyperparam_mode == 'wandb' }}
    name: Sweep Phase 2 (Bayes refinement)
    runs-on: ubuntu-latest
    needs: wandb_retrieve_best_hyperparameters
    steps:
      - name: Launch W&B Sweep (Phase 2)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,GRID_DIR,WANDB_API_KEY,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,WANDB_ENTITY,WANDB_SWEEP_ID2,
            GRID_MODE,WANDB_COUNT
          script: |
            cd $APP_DIR
            wandb agent --count 100 ${WANDB_ENTITY}/${WANDB_PROJECT}/${WANDB_SWEEP_ID2}

  vast_pretrain:
    name: Pretain JEPA Model
    runs-on: ubuntu-latest
    needs: [vast_learn_hyperparameters, vast_sweep_phase2]
    if: |
      ${{ github.event.inputs.run_vast_jobs != 'false' }} ||
      (github.event.inputs.param_type != 'wandb' && always() && needs.vast_learn_hyperparameters.result == 'success') ||
      (github.event.inputs.param_type == 'custom' && always() && needs.vast_sweep_phase2.result == 'success')
    steps:
      - name: Pretrain on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 40m
          envs: APP_DIR,GRID_CACHE_DIR,PRETRAIN_CACHE_DIR,MAMBA_ROOT_PREFIX,PYTHONPATH,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,
            GRID_MODE,WANDB_COUNT
          script: |
            bash "$APP_DIR/scripts/ci/run-pretrain.sh"
        env:
          HARD_WALL_MINS: 30
          KILL_AFTER_SECS: 60

  vast_finetune:
    if: ${{ github.event.inputs.run_vast_jobs != 'false' }}
    name: Fine tune model
    runs-on: ubuntu-latest
    needs: vast_pretrain
    steps:
      - name: Finetune on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 190m
          envs: APP_DIR,GRID_CACHE_DIR,PRETRAIN_CACHE_DIR,FINETUNE_CACHE_DIR, MAMBA_ROOT_PREFIX,PYTHONPATH,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID
          script: |
            bash "$APP_DIR/scripts/ci/run-finetune.sh"
        env:
          HARD_WALL_MINS: 180
          KILL_AFTER_SECS: 600

  vast_benchmark:
    if: ${{ github.event.inputs.run_vast_jobs != 'false' }}
    name: Benchmark
    runs-on: ubuntu-latest
    needs: vast_finetune
    steps:
      - name: Benchmark on Vast
        uses: appleboy/ssh-action@v1 
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 70m
          envs: APP_DIR,GRID_CACHE_DIR,PRETRAIN_CACHE_DIR,FINETUNE_CACHE_DIR, MAMBA_ROOT_PREFIX,PYTHONPATH,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID
          script: |
            bash "$APP_DIR/scripts/ci/run-bench.sh"
        env:
          HARD_WALL_MINS: 60
          KILL_AFTER_SECS: 60

  vast_tox21:
    if: ${{ github.event.inputs.run_vast_jobs != 'false' }}
    name: Tox21 Evaluation
    runs-on: ubuntu-latest
    needs: vast_finetune
    steps:
      - name: Tox21 on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 70m
          envs: APP_DIR,GRID_CACHE_DIR,TOX21_CACHE_DIR, MAMBA_ROOT_PREFIX,PYTHONPATH,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID
          script: |
            bash "$APP_DIR/scripts/ci/run-tox21.sh"
        env:
          HARD_WALL_MINS: 60
          KILL_AFTER_SECS: 60
