# .github/workflows/ci-vast.yml
name: CI → Vast GPU

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      task_flags:
        description: >-
          Comma separated flags controlling optional tasks.
          Supported values: force_refresh, run_unit_tests, run_vast_jobs,
          force_unfreeze_grid. Example: "run_unit_tests,run_vast_jobs".
          Omit a flag to skip its task.
        required: false
        default: "force_refresh,run_unit_tests,run_vast_jobs"
      cache_overrides:
        description: >-
          JSON object mapping cache keys (sweep, grid, pretrain, finetune,
          bench, tox21, reports) to custom directories. Example:
          '{"grid": "/data/custom/grid", "sweep": "/tmp/sweeps"}'.
        required: false
        default: "{}"
      force_rerun:
        description: "Comma-separated stage names to force rerun"
        required: false
        default: ""
      hyperparam_mode:
        description: "Which hyperparameter search strategy to use"
        required: false
        default: "wandb"
        type: choice
        options:
          - custom
          - wandb

concurrency:
  group: vast-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /srv/mjepa
  VENV_DIR: /srv/mjepa/.venv
  PIP_CACHE_DIR: /data/mjepa/.pip-cache
  RUN_UNIT_TESTS: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_unit_tests') }}
  RUN_VAST_JOBS: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
  FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.task_flags || '', 'force_refresh') && 'true' || 'false' }}
  WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
  WANDB_ENTITY: karthik-iyer-la-trobe-university
  WANDB_PROJECT: m-jepa
  WANDB_RUN_ID: ${{ github.run_id }}
  WANDB_RESUME: allow
  WANDB_RUN_GROUP: ${{ github.run_id }}
  MAMBA_ROOT_PREFIX: /data/mjepa/micromamba
  WANDB_DIR: /data/mjepa/wandb
  WANDB_SWEEP_ID1: ey6pd85u
  WANDB_SWEEP_ID2: ongqx38g
  WANDB_COUNT: 10
  HARD_WALL_MINS: 120
  KILL_AFTER_SECS: 120
  GRID_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb' }}
  CACHE_DIR: /data/mjepa/cache/graphs_50k
  SWEEP_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).sweep || '/data/mjepa/cache/graphs_50k' }}
  EXPERIMENTS_ROOT: /data/mjepa/experiments
  RUN_ID: ${{ github.run_id }}
  EXP_ID: ${{ github.run_id }}
  PRETRAIN_EXP_ID: ${{ github.run_id }}
  GRID_EXP_ID: ${{ github.run_id }}
  # as such this cache is used inside a single run only
  #Changing cache to be used across runs, change to fixed directory e.g. /data/mjepa/cache/grid
  # either delete stamp (rm /data/mjepa/cache/grid/.stamp) or point to empty directory ("") for forced reruns
  # GRID_CACHE_DIR: ${{ github.event.inputs.grid_cache_dir || '' }}
  # PRETRAIN_CACHE_DIR: ${{ github.event.inputs.pretrain_cache_dir || '' }}
  # FINETUNE_CACHE_DIR: ${{ github.event.inputs.finetune_cache_dir || '' }}
  # BENCH_CACHE_DIR: ${{ github.event.inputs.bench_cache_dir || '' }}
  # TOX21_CACHE_DIR: ${{ github.event.inputs.tox21_cache_dir || '' }}
  GRID_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).grid || '/data/mjepa/cache/grid' }}
  PRETRAIN_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).pretrain || '/data/mjepa/cache/pretrain' }}
  FINETUNE_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).finetune || '/data/mjepa/cache/finetune' }}
  BENCH_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).bench || '/data/mjepa/cache/bench' }}
  TOX21_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).tox21 || '/data/mjepa/cache/tox21' }}
  REPORTS_CACHE_DIR: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.cache_overrides).reports || '/data/mjepa/cache/reports' }}
  FORCE_UNFREEZE_GRID: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.task_flags || '', 'force_unfreeze_grid') && '1' || '0' }}
  CI_FORCE_UNFREEZE_GRID: ${{ github.event_name == 'workflow_dispatch' && contains(github.event.inputs.task_flags || '', 'force_unfreeze_grid') && '1' || '0' }}
  CI_PHASE1_FORCE_REUSE_GRID: '0'
  CI_PHASE2_FORCE_REUSE_PHASE2_IDS: '0'
  FORCE_RERUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_rerun || '' }}
  GRID_MODE_VAR: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb' }}

jobs:
  tests_quick:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_unit_tests') }}

    name: Quick tests (no gpu, no slow)
    runs-on: ubuntu-latest
    env:
      MAMBA_ROOT_PREFIX: ~/micromamba
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: mjepa
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=3.10 rdkit=2023.09.5 scipy pip
      - name: Install deps
        run: |
          micromamba run -n mjepa python -m pip install --no-deps deepchem==2.8.0
          micromamba run -n mjepa python -m pip install --upgrade pip setuptools wheel "numpy<2"
          micromamba run -n mjepa python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.1
          micromamba run -n mjepa python -m pip install --no-cache-dir -f https://data.pyg.org/whl/torch-2.2.1+cpu.html torch-scatter==2.1.2
          micromamba run -n mjepa python -m pip install torch-geometric==2.5.3
          micromamba run -n mjepa python -m pip install -r requirements.txt
      - name: Verify installs
        run: |
          micromamba run -n mjepa python - <<'PY'
          import torch, rdkit, deepchem, torch_scatter, torch_geometric
          print('torch', torch.__version__)
          print('cuda', torch.cuda.is_available())
          from rdkit import Chem
          print('rdkit', rdkit.__version__)
          print('deepchem', deepchem.__version__)
          print('torch_scatter', torch_scatter.__version__)
          print('torch_geometric', torch_geometric.__version__)
          PY
      - name: Run tests
        run: micromamba run -n mjepa python -m pytest -m "not gpu and not slow" -q

  vast_smoke:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Smoke on Vast (GPU present?)
    runs-on: ubuntu-latest
    steps:
      - name: GPU sanity
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          script: |
            set -e
            whoami
            nvidia-smi
            python3 - <<'PY' || true
            import torch
            print('torch:', torch.__version__)
            print('cuda available:', torch.cuda.is_available())
            PY

  vast_deploy_and_prepare_environment:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Deploy + Prepare environment
    runs-on: ubuntu-latest
    needs: vast_smoke
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1
      - name: Bootstrap environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,MAMBA_ROOT_PREFIX
          script: |
            set -e
            mkdir -p "$APP_DIR"
            if [ ! -x "/data/mjepa/micromamba/bin/micromamba" ]; then
              mkdir -p /data/mjepa/micromamba
              curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest \
                | tar -xj -C /data/mjepa/micromamba bin/micromamba
            fi
            echo "Prepared environment at $APP_DIR"
      - name: Sync repository (incremental)
        uses: appleboy/ssh-action@v1
        env:
          #REPO_TOKEN: ${{ secrets.GH_PAT_RO }}
          DEFAULT_TOKEN: ${{ secrets.GH_PAT_RO }}  # PAT with at least 'repo' scope
          GIT_LFS_SKIP_SMUDGE: 1
          REPO: Kar488/M-JEPA
          BRANCH: master
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          envs: APP_DIR,REPO,BRANCH,DEFAULT_TOKEN
          script: |
            set -euo pipefail

            # Tell git to use the deploy key when connecting to GitHub.
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/mjepa_deploy_key -o StrictHostKeyChecking=no"
            
            # Clone or update via SSH instead of HTTPS
            AUTH_URL="git@github.com:${REPO}.git"
            # AUTH_URL="https:///x-access-token:${DEFAULT_TOKEN}@github.com/${REPO}.git"

            mkdir -p "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              git -C "$APP_DIR" reset --hard HEAD
              git -C "$APP_DIR" clean -fd
              git -C "$APP_DIR" remote set-url origin "$AUTH_URL"
              # git -C "$APP_DIR" fetch --depth=1 origin "$BRANCH"
              timeout 300 git -C "$APP_DIR" fetch --progress --verbose --prune --depth=1 --filter=blob:none origin "$BRANCH"
              git -C "$APP_DIR" checkout -B "$BRANCH" "origin/$BRANCH"
            else
              # git clone --depth=1 --branch "$BRANCH" "$AUTH_URL" "$APP_DIR"
              timeout 300 git clone --depth=1 --progress --verbose --filter=blob:none "$AUTH_URL" "$APP_DIR"
              git -C "$APP_DIR" checkout "$BRANCH"
            fi

            # Define a proper LFS endpoint with your PAT
            LFS_URL="https://x-access-token:${DEFAULT_TOKEN}@github.com/${REPO}.git/info/lfs"
            git -C "$APP_DIR" config lfs.url "$LFS_URL"
          
            # Fetch and checkout all LFS objects for this branch
            git -C "$APP_DIR" lfs pull origin "$BRANCH"
      - name: Setup micromamba environment
        uses: appleboy/ssh-action@v1
        timeout-minutes: 30        # connection timeout
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 30m # allow remote script to run for 30 minutes
          envs: APP_DIR,MAMBA_ROOT_PREFIX,PIP_CACHE_DIR,WANDB_DIR,CACHE_DIR,EXP_ROOT,RUN_ID
          script: |
            set -e
            cd "$APP_DIR"
            bash scripts/ci/prepare_env.sh

  vast_learn_hyperparameters:
    if: ${{ (github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs') }}
    name: Learn hyperparameters (Custom or WandB)
    runs-on: ubuntu-latest
    #timeout-minutes: 740
    needs: [tests_quick,vast_deploy_and_prepare_environment]
    outputs:
      grid_exp_id: ${{ steps.phase1_ids.outputs.grid_exp_id }}
      pretrain_exp_id: ${{ steps.phase1_ids.outputs.pretrain_exp_id }}
    steps:
      - name: Run grid search
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 940m
          envs: APP_DIR,GRID_DIR,PRETRAIN_DIR,FINETUNE_DIR,BENCH_DIR,TOX21_DIR,MAMBA_ROOT_PREFIX,PYTHONPATH,LOG_DIR,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,
            GITHUB_RUN_ID,WANDB_ENTITY,CACHE_DIR,SWEEP_CACHE_DIR,SSH_KEY,VAST_HOST,VAST_USER,VAST_PORT,
            GRID_MODE,WANDB_COUNT,EXPORT_OUT_PATH,EXPORT_PHASE2_PATH,PHASE2_UNLABELED_DIR,PHASE2_LABELED_DIR,
            PE_MIN_PRETRAIN_EPOCHS,PE_MIN_FINETUNE_EPOCHS,PE_MIN_PRETRAIN_BATCHES,PHASE1_BACKBONES,PHASE1_SEEDS
          script: |
            bash "$APP_DIR/scripts/ci/run-grid-or-phase1.sh"
        env:
          HARD_WALL_MINS: 900
          KILL_AFTER_SECS: 120
          # Set matching backbone/seed combinations so JEPA & contrastive sweeps stay paired.
          WANDB_COUNT: 24
          GRID_MODE: "wandb"   # or "custom"
          EXPORT_OUT_PATH: ${{ env.GRID_DIR }}/best_grid_config.json
          EXPORT_PHASE2_PATH: ${{ env.GRID_DIR }}/grid_sweep_phase2.yaml
          PHASE2_UNLABELED_DIR: ${{ env.APP_DIR }}/data/ZINC-canonicalized
          PHASE2_LABELED_DIR:  ${{ env.APP_DIR }}/data/katielinkmoleculenet_benchmark/train
          PE_MIN_PRETRAIN_EPOCHS: 5
          PE_MIN_FINETUNE_EPOCHS: 1
          PE_MIN_PRETRAIN_BATCHES: 200
          # W&B sweeps pair runs via PHASE1_BACKBONES/PHASE1_SEEDS; PHASE1_SWEEP_SEED is deprecated.
          PHASE1_BACKBONES: gine,dmpnn,schnet3d
          PHASE1_SEEDS: 1,2,3,4,5
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
      - name: Checkout helper scripts
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts/ci
          sparse-checkout-cone-mode: false
      # Capture lineage ids after Phase-1 so subsequent jobs reuse the correct slots.
      - name: Resolve Phase-1 lineage identifiers
        id: phase1_ids
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
          APP_DIR: ${{ env.APP_DIR }}
          EXPERIMENTS_ROOT: ${{ env.EXPERIMENTS_ROOT }}
          RUN_ID: ${{ github.run_id }}
        run: bash scripts/ci/publish_phase1_lineage.sh
  # Option X: keep a single Vast job running sweep → recheck → export sequentially.
  vast_sweep_phase2:
    if: ${{ ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) && ((github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb') == 'wandb') }}
    name: Phase 2 (sweep → recheck → export)
    runs-on: ubuntu-latest
    #timeout-minutes: 1860
    needs: vast_learn_hyperparameters
    concurrency:
      group: phase2-${{ github.ref }}-${{ github.run_id }}
      cancel-in-progress: true
    env:
      RUN_ID: ${{ github.run_id }}
      EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      GRID_EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.pretrain_exp_id || needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      PHASE2_SWEEP_WALL_MINS: 920
      PHASE2_RECHECK_WALL_MINS: 180
      PHASE2_EXPORT_WALL_MINS: 30
    steps:
      - name: Run Phase-2 stages on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 940m
          envs: APP_DIR,GRID_DIR,PRETRAIN_DIR,MAMBA_ROOT_PREFIX,PYTHONPATH,LOG_DIR,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,
            GITHUB_RUN_ID,WANDB_ENTITY,CACHE_DIR,SWEEP_CACHE_DIR,RUN_ID,EXP_ID,GRID_EXP_ID,PRETRAIN_EXP_ID,SSH_KEY,VAST_HOST,VAST_USER,VAST_PORT,
            PHASE2_SWEEP_WALL_MINS,PHASE2_RECHECK_WALL_MINS,PHASE2_EXPORT_WALL_MINS,
            GRID_MODE,WANDB_COUNT, TOPK_RECHECK,EXTRA_SEEDS,PHASE2_METRIC,PHASE2_DIRECTION,PHASE2_UNLABELED_DIR,PHASE2_LABELED_DIR,
            PHASE2_AGENT_COUNT,CI_FORCE_UNFREEZE_GRID,CI_PHASE2_FORCE_REUSE_PHASE2_IDS
          script: |
            bash "$APP_DIR/scripts/ci/run-grid-phase2.sh"
        env:
          # agent knobs (already have these)
          HARD_WALL_MINS: ${{ env.PHASE2_SWEEP_WALL_MINS }}
          KILL_AFTER_SECS: 120
          WANDB_COUNT: 20
          # recheck knobs (separate budget)
          TOPK_RECHECK: 5
          EXTRA_SEEDS: 5
          PHASE2_METRIC: val_rmse
          PHASE2_DIRECTION: min
          PHASE2_UNLABELED_DIR: ${{ env.APP_DIR }}/data/ZINC-canonicalized
          PHASE2_LABELED_DIR:  ${{ env.APP_DIR }}/data/katielinkmoleculenet_benchmark/train
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_PORT: ${{ secrets.VAST_PORT }}

      # Run on the GitHub runner so helper scripts referenced below are available
      # locally; this does not affect the remote Vast execution.
      - name: Checkout repository for artifact collection
        if: always()
        uses: actions/checkout@v4

      - name: Collect Phase-2 artifacts
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
          EXP_ID: ${{ env.EXP_ID }}
          EXPERIMENTS_ROOT: ${{ env.EXPERIMENTS_ROOT }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" && ls -la "$GITHUB_WORKSPACE" || true
          ls -la "$GITHUB_WORKSPACE/scripts/ci" || true
          test -f "$GITHUB_WORKSPACE/scripts/ci/collect-phase2-artifacts.sh" && echo "collector=present" || echo "collector=missing"
          bash "$GITHUB_WORKSPACE/scripts/ci/collect-phase2-artifacts.sh" "$RUNNER_TEMP/phase2"

      - name: Upload Phase-2 sweep logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase2-sweep
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase2/current/phase2_sweep
            ${{ runner.temp }}/phase2/phase2_sweep

      - name: Upload Phase-2 recheck logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase2-recheck
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase2/current/phase2_recheck
            ${{ runner.temp }}/phase2/phase2_recheck

      - name: Upload Phase-2 export logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase2-export
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase2/current/phase2_export
            ${{ runner.temp }}/phase2/phase2_export

      - name: Upload Phase-2 grid outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-phase2-grid
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/phase2/current/grid
            ${{ runner.temp }}/phase2/grid

  vast_pretrain:
    name: Pretain Model
    runs-on: ubuntu-latest
    needs: [vast_learn_hyperparameters, vast_sweep_phase2]
    if: >
      ${{
          ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) && (
            ((github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb') == 'wandb' &&
             needs.vast_sweep_phase2.result == 'success')
          ||
            ((github.event_name == 'workflow_dispatch' && github.event.inputs.hyperparam_mode || 'wandb') == 'custom' &&
             needs.vast_learn_hyperparameters.result == 'success')
          )
      }}
    env:
      EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      GRID_EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_learn_hyperparameters.outputs.pretrain_exp_id || needs.vast_learn_hyperparameters.outputs.grid_exp_id || github.run_id }}
    outputs:
      exp_id: ${{ steps.pretrain_state.outputs.exp_id }}
      pretrain_root: ${{ steps.pretrain_state.outputs.experiment_root }}
      pretrain_manifest: ${{ steps.pretrain_state.outputs.manifest_path }}
      pretrain_encoder: ${{ steps.pretrain_state.outputs.encoder_path }}
      pretrain_tox21_env: ${{ steps.pretrain_state.outputs.tox21_env }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pretrain on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 199m
          envs: APP_DIR,GRID_DIR,PRETRAIN_DIR,MAMBA_ROOT_PREFIX,PYTHONPATH,LOG_DIR,CKPT_DIR,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,
            GRID_MODE,WANDB_COUNT,SSH_KEY,VAST_HOST,VAST_USER,VAST_PORT,
            PRETRAIN_EPOCHS,FINETUNE_EPOCHS,
            BESTCFG_NO_EPOCHS,EXP_ID,GRID_EXP_ID,PRETRAIN_EXP_ID,PRETRAIN_EXPERIMENT_ROOT,PRETRAIN_STATE_FILE,PRETRAIN_STATE_FILE_CANONICAL,EXPERIMENTS_ROOT
          script: |
            bash "$APP_DIR/scripts/ci/run-pretrain.sh"
        env:
          HARD_WALL_MINS: 190
          KILL_AFTER_SECS: 120
          PRETRAIN_EPOCHS: "70"
          FINETUNE_EPOCHS: "8"
          BESTCFG_NO_EPOCHS: "1"
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_PORT: ${{ secrets.VAST_PORT }}

      - name: Fetch pretrain state snapshot
        id: pretrain_state
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
          EXPERIMENTS_ROOT: ${{ env.EXPERIMENTS_ROOT }}
        run: bash "$GITHUB_WORKSPACE/scripts/ci/fetch-pretrain-state.sh" pretrain_artifacts

      - name: Collect pretrain artifacts
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_PORT: ${{ secrets.VAST_PORT }}
        run: bash "$GITHUB_WORKSPACE/scripts/ci/collect-pretrain-artifacts.sh" pretrain_artifacts

      - name: Upload pretrain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vast-pretrain-artifacts
          if-no-files-found: ignore
          path: pretrain_artifacts

  vast_tox21_baseline:
    name: Tox21 Baseline
    runs-on: ubuntu-latest
    needs: vast_pretrain
    if:
      ${{
          ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) &&
          needs.vast_pretrain.result == 'success' }}
    outputs:
      tox21_gate: ${{ steps.tox21_gate.outputs.value }}
    env:
      EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXPERIMENT_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      EXP_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      PRETRAIN_MANIFEST: ${{ needs.vast_pretrain.outputs.pretrain_manifest }}
      PRETRAIN_ENCODER_PATH: ${{ needs.vast_pretrain.outputs.pretrain_encoder }}
      PRETRAIN_TOX21_ENV: ${{ needs.vast_pretrain.outputs.pretrain_tox21_env }}
      PRETRAIN_STATE_FILE: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      PRETRAIN_STATE_FILE_CANONICAL: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      EXPERIMENTS_ROOT: /data/mjepa/experiments
    steps:
      - name: Tox21 baseline on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 100m
          envs: APP_DIR,GRID_DIR,TOX21_DIR,MAMBA_ROOT_PREFIX,PYTHONPATH,LOG_DIR,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,
            PRETRAIN_EPOCHS,FINETUNE_EPOCHS,SSH_KEY,VAST_HOST,VAST_USER,VAST_PORT,
            BESTCFG_NO_EPOCHS,TOX21_ENCODER_SOURCE,EXP_ID,PRETRAIN_EXP_ID,PRETRAIN_EXPERIMENT_ROOT,PRETRAIN_MANIFEST,PRETRAIN_STATE_FILE,PRETRAIN_STATE_FILE_CANONICAL,PRETRAIN_TOX21_ENV,PRETRAIN_ENCODER_PATH,EXPERIMENTS_ROOT
          script: |
            bash "$APP_DIR/scripts/ci/run-tox21.sh"
        env:
          HARD_WALL_MINS: 90
          KILL_AFTER_SECS: 120
          PRETRAIN_EPOCHS: "70"
          FINETUNE_EPOCHS: "18"
          BESTCFG_NO_EPOCHS: "1"
          TOX21_ENCODER_SOURCE: pretrain_frozen
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
          VAST_HOST: ${{ secrets.VAST_HOST }}
          VAST_USER: ${{ secrets.VAST_USER }}
          VAST_PORT: ${{ secrets.VAST_PORT }}

      - name: Collect tox21 baseline outputs
        if: always()
        env:
          SSH_KEY: ${{ secrets.VAST_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/vast_key
          chmod 600 ~/.ssh/vast_key
          mkdir -p tox21_baseline_outputs
          rsync -avz --chmod=ugo=rwX -e "ssh -i ~/.ssh/vast_key -p ${{ secrets.VAST_PORT }} -o StrictHostKeyChecking=no" \
            "${{ secrets.VAST_USER }}@${{ secrets.VAST_HOST }}:${{ env.EXP_ROOT }}/tox21_gate.env" tox21_baseline_outputs/ || true
          rm -f ~/.ssh/vast_key

      - name: Derive tox21 gate status
        if: always()
        id: tox21_gate
        run: |
          set -euo pipefail
          value=false
          gate_file="tox21_baseline_outputs/tox21_gate.env"
          if [ -f "$gate_file" ]; then
            raw=$(grep -E '^TOX21_MET_GATE=' "$gate_file" | tail -n1 | cut -d'=' -f2-)
            if [ -n "$raw" ]; then
              raw=$(echo "$raw" | tr '[:upper:]' '[:lower:]')
              if [[ "$raw" == "true" ]]; then
                value=true
              fi
            fi
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "TOX21_MET_GATE=$value" >> "$GITHUB_ENV"

  vast_finetune:
    name: Fine tune model
    runs-on: ubuntu-latest
    needs: [vast_pretrain, vast_tox21_baseline]
    if:
      ${{
          ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) &&
          needs.vast_pretrain.result == 'success' &&
          needs.vast_tox21_baseline.result == 'success' &&
          needs.vast_tox21_baseline.outputs.tox21_gate == 'false' }}
    env:
      EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXPERIMENT_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      EXP_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      PRETRAIN_MANIFEST: ${{ needs.vast_pretrain.outputs.pretrain_manifest }}
      PRETRAIN_ENCODER_PATH: ${{ needs.vast_pretrain.outputs.pretrain_encoder }}
      PRETRAIN_STATE_FILE: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      PRETRAIN_STATE_FILE_CANONICAL: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      EXPERIMENTS_ROOT: /data/mjepa/experiments
    steps:
      - name: Finetune on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 190m
          envs: APP_DIR,GRID_DIR,PRETRAIN_DIR,FINETUNE_DIR, MAMBA_ROOT_PREFIX,PYTHONPATH,LOG_DIR,CKPT_DIR,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,
            PRETRAIN_EPOCHS,FINETUNE_EPOCHS,
            BESTCFG_NO_EPOCHS,EXP_ID,PRETRAIN_EXP_ID,PRETRAIN_EXPERIMENT_ROOT,PRETRAIN_MANIFEST,PRETRAIN_STATE_FILE,PRETRAIN_STATE_FILE_CANONICAL,PRETRAIN_ENCODER_PATH,EXPERIMENTS_ROOT
          script: |
            bash "$APP_DIR/scripts/ci/run-finetune.sh"
        env:
          HARD_WALL_MINS: 180
          KILL_AFTER_SECS: 120
          PRETRAIN_EPOCHS: "40"
          FINETUNE_EPOCHS: "18"
          BESTCFG_NO_EPOCHS: "1"

  vast_benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: [vast_pretrain, vast_tox21_baseline, vast_finetune]
    if:
      ${{
          always() &&
          ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) }}
    env:
      EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXPERIMENT_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      EXP_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      PRETRAIN_MANIFEST: ${{ needs.vast_pretrain.outputs.pretrain_manifest }}
      PRETRAIN_ENCODER_PATH: ${{ needs.vast_pretrain.outputs.pretrain_encoder }}
      PRETRAIN_STATE_FILE: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      PRETRAIN_STATE_FILE_CANONICAL: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      EXPERIMENTS_ROOT: /data/mjepa/experiments
    steps:
      - name: Summarise tox21 gate outcome
        run: |
          echo "TOX21_MET_GATE=${{ needs.vast_tox21_baseline.outputs.tox21_gate }}"

      - name: Benchmark on Vast
        if: ${{ needs.vast_finetune.result == 'success' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 130m
          envs: APP_DIR,GRID_DIR,PRETRAIN_DIR,FINETUNE_DIR, BENCH_DIR, MAMBA_ROOT_PREFIX,PYTHONPATH,LOG_DIR,
            BENCH_VAL_DIR,BENCH_TEST_DIR,PHASE2_LABELED_DIR,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,
            PRETRAIN_EPOCHS,FINETUNE_EPOCHS,
            BESTCFG_NO_EPOCHS,TOX21_MET_GATE,EXP_ID,PRETRAIN_EXP_ID,PRETRAIN_EXPERIMENT_ROOT,PRETRAIN_MANIFEST,PRETRAIN_STATE_FILE,PRETRAIN_STATE_FILE_CANONICAL,PRETRAIN_ENCODER_PATH,EXPERIMENTS_ROOT
        env:
          HARD_WALL_MINS: 120
          KILL_AFTER_SECS: 120
          BENCH_VAL_DIR:  ${{ env.APP_DIR }}/data/katielinkmoleculenet_benchmark/val
          BENCH_TEST_DIR: ${{ env.APP_DIR }}/data/katielinkmoleculenet_benchmark/test
          TOX21_MET_GATE: ${{ needs.vast_tox21_baseline.outputs.tox21_gate }}

  vast_tox21:
    name: Tox21 Evaluation
    runs-on: ubuntu-latest
    needs: [vast_pretrain, vast_finetune]
    if:
      ${{
          ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) &&
          needs.vast_finetune.result == 'success' }}
    env:
      EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXP_ID: ${{ needs.vast_pretrain.outputs.exp_id }}
      PRETRAIN_EXPERIMENT_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      EXP_ROOT: ${{ needs.vast_pretrain.outputs.pretrain_root }}
      PRETRAIN_MANIFEST: ${{ needs.vast_pretrain.outputs.pretrain_manifest }}
      PRETRAIN_ENCODER_PATH: ${{ needs.vast_pretrain.outputs.pretrain_encoder }}
      PRETRAIN_TOX21_ENV: ${{ needs.vast_pretrain.outputs.pretrain_tox21_env }}
      PRETRAIN_STATE_FILE: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      PRETRAIN_STATE_FILE_CANONICAL: ${{ needs.vast_pretrain.outputs.pretrain_root }}/pretrain_state.json
      EXPERIMENTS_ROOT: /data/mjepa/experiments
    steps:
      - name: Tox21 on Vast
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 100m
          envs: APP_DIR,GRID_DIR,TOX21_DIR, MAMBA_ROOT_PREFIX,PYTHONPATH,LOG_DIR,
            WANDB_API_KEY,WANDB_PROJECT,WANDB_DIR,WANDB_RESUME,WANDB_RUN_ID,WANDB_NAME,WANDB_JOB_TYPE,HARD_WALL_MINS,KILL_AFTER_SECS,GITHUB_RUN_ID,
            PRETRAIN_EPOCHS,FINETUNE_EPOCHS,
            BESTCFG_NO_EPOCHS,TOX21_ENCODER_SOURCE,EXP_ID,PRETRAIN_EXP_ID,PRETRAIN_EXPERIMENT_ROOT,PRETRAIN_MANIFEST,PRETRAIN_STATE_FILE,PRETRAIN_STATE_FILE_CANONICAL,PRETRAIN_TOX21_ENV,PRETRAIN_ENCODER_PATH,EXPERIMENTS_ROOT
          script: |
            bash "$APP_DIR/scripts/ci/run-tox21.sh"
        env:
          HARD_WALL_MINS: 90
          KILL_AFTER_SECS: 120
          PRETRAIN_EPOCHS: "70"
          FINETUNE_EPOCHS: "18"
          BESTCFG_NO_EPOCHS: "1" # use best config without reloading any epochs
          TOX21_ENCODER_SOURCE: fine_tuned

  vast_report:
    name: Generate reports
    runs-on: ubuntu-latest
    needs: [vast_tox21_baseline, vast_benchmark, vast_tox21, vast_finetune]
    if:
      ${{
          always() &&
          ((github.event_name != 'workflow_dispatch') || contains(github.event.inputs.task_flags || '', 'run_vast_jobs')) }}
    steps:
      - name: Publish Vast report
        if: ${{ needs.vast_benchmark.result == 'success' && needs.vast_tox21.result == 'success' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VAST_HOST }}
          username: ${{ secrets.VAST_USER }}
          port: ${{ secrets.VAST_PORT }}
          key: ${{ secrets.VAST_SSH_KEY }}
          #passphrase: ${{ secrets.VAST_SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 60m
          envs: APP_DIR,REPORTS_DIR,REPORTS_CACHE_DIR,LOG_DIR,WANDB_API_KEY,WANDB_ENTITY,WANDB_PROJECT,WANDB_RUN_ID,WANDB_RUN_GROUP,WANDB_RESUME,WANDB_DIR
          script: |
            bash "$APP_DIR/scripts/ci/run-report.sh"
