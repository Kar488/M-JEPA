name: Train JEPA on Vast

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: [self-hosted, gpu]   # matches your runner labels
    steps:
      - uses: actions/checkout@v4

      # Make Vast PyTorch image's Python visible
      - name: Prepare PATH
        run: echo "PATH=/venv/main/bin:$PATH" >> $GITHUB_ENV

      # Install PyTorch if missing
      - name: Install PyTorch if missing
        run: |
          python - <<'PY'
          try:
            import torch; print("torch:", torch.__version__)
          except Exception:
            import os; os.system("pip install --index-url https://download.pytorch.org/whl/cu121 torch torchvision torchaudio")
          PY

      # Install torch-scatter matching torch version
      - name: Install torch-scatter
        run: |
          python - <<'PY'
          import re, subprocess, sys, importlib
          v = importlib.import_module("torch").__version__
          mm = re.match(r"(\d+\.\d+)", v).group(1)
          url = {
            "2.4": "https://data.pyg.org/whl/torch-2.4.0+cu121.html",
            "2.3": "https://data.pyg.org/whl/torch-2.3.0+cu121.html",
            "2.2": "https://data.pyg.org/whl/torch-2.2.0+cu121.html",
          }.get(mm)
          if not url:
            print("Unknown torch version:", v); sys.exit(1)
          subprocess.check_call([sys.executable,"-m","pip","install","torch-scatter","-f",url])
          PY

      # Install the rest of your dependencies
      - name: Install project deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Run training
      - name: Train
        run: |
          torchrun --standalone --nproc_per_node=2 \
            scripts/train_jepa.py --config configs/default.yaml --devices 2 --patience 10

      - name: Install micromamba
        run: |
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj bin/micromamba
          mkdir -p ~/mamba && ./bin/micromamba shell init -s bash -p ~/mamba
          echo 'eval "$(/root/mamba/bin/micromamba shell hook -s bash)"' >> $GITHUB_ENV

      - name: Create & activate env
        shell: bash
        run: |
          eval "$(/root/mamba/bin/micromamba shell hook -s bash)"
          micromamba create -y -n jepa -c conda-forge python=3.10 rdkit openbabel
          micromamba activate jepa
          echo "MAMBA_RUN=eval \"$(/root/mamba/bin/micromamba shell hook -s bash)\" && micromamba activate jepa &&" >> $GITHUB_ENV

      - name: Install torch & deps
        shell: bash
        run: |
          $MAMBA_RUN pip install --upgrade pip setuptools wheel "numpy<2"
          $MAMBA_RUN pip install "torch==2.2.1" --index-url https://download.pytorch.org/whl/cpu
          $MAMBA_RUN pip install "torch-scatter==2.1.2" -f https://data.pyg.org/whl/torch-2.2.1+cpu.html
          $MAMBA_RUN pip install torch-geometric
          $MAMBA_RUN pip install -r requirements.txt