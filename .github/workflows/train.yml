name: Train JEPA on Vast

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy-to-vast:
    uses: ./.github/workflows/smoke.yml
    secrets: inherit

  train:
    needs: deploy-to-vast
    runs-on: [self-hosted, gpu]
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - name: Base environment setup
        uses: ./.github/actions/base

      - name: Train
        run: |
          torchrun --standalone --nproc_per_node=2 \
            scripts/train_jepa.py --config configs/default.yaml --devices 2 --patience 10

      - name: Install micromamba
        run: |
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj bin/micromamba
          mkdir -p ~/mamba && ./bin/micromamba shell init -s bash -p ~/mamba
          echo 'eval "$(/root/mamba/bin/micromamba shell hook -s bash)"' >> $GITHUB_ENV

      - name: Create & activate env
        shell: bash
        run: |
          eval "$(/root/mamba/bin/micromamba shell hook -s bash)"
          micromamba create -y -n jepa -c conda-forge python=3.10 rdkit openbabel
          micromamba activate jepa
          echo "MAMBA_RUN=eval \"$(/root/mamba/bin/micromamba shell hook -s bash)\" && micromamba activate jepa &&" >> \
            $GITHUB_ENV

