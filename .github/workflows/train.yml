name: Train JEPA on Vast

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy-to-vast:
    uses: ./.github/workflows/smoke.yml
    secrets: inherit

  train:
    needs: deploy-to-vast
    runs-on: [self-hosted, gpu]
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4 
        with: 
          persist-credentials: false
          fetch-depth: 0

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: jepa
          create-args: >-
            python=3.10 rdkit openbabel
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          cache-environment: true
          cache-downloads: true

      - name: Install Python deps (CPU on GitHub runner)
        shell: bash -l {0}   # <- ensures the micromamba env is active
        run: |
          pip install -U pip wheel "numpy<2"
          pip install "torch==2.2.1" --index-url https://download.pytorch.org/whl/cpu
          pip install torch-scatter torch-sparse torch-cluster torch-spline-conv -f https://data.pyg.org/whl/torch-2.2.1+cpu.html
          pip install torch-geometric
          [ -f requirements.txt ] && pip install -r requirements.txt

      - name: Train
        run: |
          torchrun --standalone --nproc_per_node=2 \
            scripts/train_jepa.py --config configs/default.yaml --devices 2 --patience 10