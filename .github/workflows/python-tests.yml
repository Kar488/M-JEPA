name: Python tests (CPU)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  quick:
    name: Unit & smoke tests (no GPU, no slow)
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0
      - name: Base environment setup
        uses: ./.github/actions/base

      - name: Run quick tests with coverage (exclude gpu & slow)
        shell: bash -l {0}
        run: |
          pytest --cache-clear -m "not gpu and not slow"

      - name: Upload test artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-quick
          path: |
            outputs/**
            .pytest_cache/**
          if-no-files-found: ignore

  slow:
    name: Extended tests (include slow, no GPU)
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Base environment setup
        uses: ./.github/actions/base

      - name: Run extended tests with coverage (exclude gpu only)
        shell: bash -l {0}
        run: |
          pytest -m "not gpu"

      - name: Upload test artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-slow
          path: |
            outputs/**
            .pytest_cache/**
          if-no-files-found: ignore
