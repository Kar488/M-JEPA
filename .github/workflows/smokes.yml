name: Smoke on Vast
on:
  workflow_dispatch:
  workflow_call:

jobs:
  smoke:
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4

      # Make the PyTorch image's Python visible to this job
      - name: Prepare PATH
        run: |
          echo "PATH=/venv/main/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH" >> $GITHUB_ENV
          echo "PATH is: $PATH"

      - name: Show GPU (if available)
        run: |
          command -v nvidia-smi || true
          /usr/bin/nvidia-smi || nvidia-smi || true

      - name: Python version & CUDA check
        run: |
          which python || true
          python -V
          python -c "import torch, sys; print('torch', torch.__version__); print('cuda available?', torch.cuda.is_available()); \
                     print('device:', torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'CPU')"