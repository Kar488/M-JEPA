# Shared arguments for train_jepa.py used in CI pipelines.
# Allows common CLI flags to be centralised.

common: &common
  cache_dir: ${CACHE_DIR}
  cache_datasets: true
  num_workers: 8
  prefetch_factor: 4
  persistent_workers: true
  pin_memory: true
  bf16: true

grid_search:
  <<: *common
  unlabeled_dir: ${APP_DIR}/data/ZINC-canonicalized
  labeled_dir: ${APP_DIR}/data/katielinkmoleculenet_benchmark/train
  label_col: "measured log solubility in mols per litre"
  task_type: regression
  methods: [jepa, contrastive]
  mask_ratios: [0.15, 0.3, 0.5]
  contiguities: [0, 1]
  hidden_dims: [256]
  num_layers_list: [3]
  gnn_types: [mpnn]
  ema_decays: [0.996, 0.998, 0.999]
  add_3d_options: [1]
  pretrain_batch_sizes: [256]
  finetune_batch_sizes: [128]
  temperatures: [0.07, 0.1, 0.2]
  pretrain_epochs_options: [1]
  finetune_epochs_options: [50]
  learning_rates: [3e-4, 1e-4]
  seeds: [1, 2, 3]
  sample_unlabeled: 100000
  sample_labeled: 5000
  n_rows_per_file: 1000
  max_pretrain_batches: 0
  max_finetune_batches: 0
  time_budget_mins: 540
  force_tqdm: true
  out_csv: ${GRID_DIR}/grid_results.csv
  best_config_out: ${GRID_DIR}/best_grid_config.json
  use_wandb: true

pretrain:
  <<: *common
  unlabeled_dir: ${APP_DIR}/data/ZINC-canonicalized
  labeled_dir:   ${APP_DIR}/data/katielinkmoleculenet_benchmark/train
  plot_dir: ${PRETRAIN_DIR}/plots
  ckpt_dir: ${PRETRAIN_DIR}
  save_every: 1
  pretrain_epochs: ${PRETRAIN_EPOCHS:-3}    # maps to --pretrain-epochs for "pretrain"
  pretrain_batch_size: 256
  sample_unlabeled: 10000000
  stream_chunk_size: 50000
  n_rows_per_file: 50000
  max_pretrain_batches: 0
  output: ${PRETRAIN_DIR}/encoder.pt
  force_tqdm: true
  use_wandb: true

finetune:
  <<: *common
  labeled_dir: "${FINETUNE_LABELED_DIR:-${APP_DIR}/data/katielinkmoleculenet_benchmark/train}"
  labeled_csv: "${FINETUNE_LABELED_CSV:-}"
  encoder: ${PRETRAIN_DIR}/encoder.pt
  task_type: "${FINETUNE_TASK_TYPE:-classification}"
  label_col: "${FINETUNE_LABEL_COL:-measured log solubility in mols per litre}"
  ckpt_dir: ${FINETUNE_DIR}
  save_every: 1
  finetune_epochs: ${FINETUNE_EPOCHS:-50}    # maps to --epochs for "finetune"
  metric: "${FINETUNE_METRIC:-val_auc}"
  patience: ${FINETUNE_PATIENCE:-5}
  batch_size: ${FINETUNE_BATCH_SIZE:-128}
  max_finetune_batches: 0
  no_freeze_encoder: true  # let Vast reruns update encoder weights once the Tox21 gate fails
  use_scaffold: ${FINETUNE_USE_SCAFFOLD:-false}
  hidden_dim: ${FINETUNE_HIDDEN_DIM:-256}
  num_layers: ${FINETUNE_NUM_LAYERS:-3}
  dropout: ${FINETUNE_DROPOUT:-0.1}
  encoder_lr: ${FINETUNE_ENCODER_LR:-1.0e-4}
  head_lr: ${FINETUNE_HEAD_LR:-1.0e-4}
  layerwise_decay: ${FINETUNE_LAYERWISE_DECAY:-}
  seeds:
    - ${FINETUNE_SEED_0:-0}
    - ${FINETUNE_SEED_1:-}
    - ${FINETUNE_SEED_2:-}
  use_wandb: true

bench:
  <<: *common
  labeled_dir: ${APP_DIR}/data/katielinkmoleculenet_benchmark/test
  test_dir:   ${BENCH_DATA_DIR}
  label_col: "measured log solubility in mols per litre"
  dataset: esol
  task_type: regression
  jepa_encoder: ${PRETRAIN_DIR}/encoder.pt
  ft_ckpt: ${FINETUNE_DIR}/head.pt
  report_dir: ${BENCH_DIR}/reports
  report_stem: ${REPORT_STEM}
  use_wandb: true

tox21:
  <<: *common
  csv: ${APP_DIR}/data/tox21/data.csv
  tasks:
    - NR-AR
    - NR-AR-LBD
    - NR-AhR
    - NR-Aromatase
    - NR-ER
    - NR-ER-LBD
    - NR-PPAR-gamma
    - SR-ARE
    - SR-ATAD5
    - SR-HSE
    - SR-MMP
    - SR-p53
  dataset: tox21
  tox21_dir: ${TOX21_DIR}
  pretrain_epochs: ${PRETRAIN_EPOCHS:-3}    # maps to --pretrain-epochs for "tox21"
  finetune_epochs: ${FINETUNE_EPOCHS:-15}   # maps to --finetune-epochs for "tox21"
  pretrain_time_budget_mins: 90
  finetune_time_budget_mins: 60
  encoder_checkpoint: ${TOX21_ENCODER_CHECKPOINT}
  encoder_manifest: ${TOX21_ENCODER_MANIFEST:-${PRETRAIN_MANIFEST}}
  encoder_source: ${TOX21_ENCODER_SOURCE:-pretrain_frozen}
  evaluation_mode: ${TOX21_EVALUATION_MODE:-${TOX21_ENCODER_SOURCE:-pretrain_frozen}}
  batch_size: 256
  epochs: 15
  patience: 12
  head_lr: ${TOX21_HEAD_LR:-0.0005}
  encoder_lr: ${TOX21_ENCODER_LR:-0.00005}
  weight_decay: ${TOX21_WEIGHT_DECAY:-0.0001}
  hidden_dim: ${TOX21_HIDDEN_DIM:-384}
  num_layers: ${TOX21_NUM_LAYERS:-4}
  dropout: ${TOX21_DROPOUT:-0.15}
  head_ensemble_size: ${TOX21_HEAD_ENSEMBLE_SIZE:-3}
  head_scheduler: ${TOX21_HEAD_SCHEDULER:-cosine}
  triage_pct: ${TOX21_TRIAGE_PCT:-0.0}
  class_weights: "${TOX21_CLASS_WEIGHTS:-auto}"
  pos_class_weight: "${TOX21_POS_CLASS_WEIGHT:-}"
  allow_shape_coercion: false
  allow_equal_hash: false
  verify_match_threshold: 0.98
  use_wandb: true
  explain_mode: ${TOX21_EXPLAIN_MODE:-}
  explain_steps: ${TOX21_EXPLAIN_STEPS:-}

report:
  project: ${WANDB_PROJECT:-m-jepa}
  entity: ${WANDB_ENTITY:-}
  manifest_path: ${REPORTS_DIR}/FIGURE_MANIFEST.md
  schema_path: ${REPORTS_DIR}/schema.json
  max_runs: ${REPORT_MAX_RUNS:-500}
  per_page: ${REPORT_PER_PAGE:-75}
  max_attempts: ${REPORT_MAX_ATTEMPTS:-5}
  refresh: true

artifacts:
  pretrain:
    - ${PRETRAIN_DIR}/encoder.pt
    - ${PRETRAIN_MANIFEST}
    - ${PRETRAIN_DIR}/stage-outputs/pretrain.json
