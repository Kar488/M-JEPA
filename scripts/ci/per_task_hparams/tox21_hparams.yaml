# scripts/ci/per_task_hparams/tox21_hparams.yaml
# Full per-task hyperparams for Tox21 (scaffold split, extreme imbalance).
# Goal: strong ROC-AUC while also reporting calibrated Brier/ECE.
#
# Principle:
# - Keep training stable (dynamic pos-weight ON; no oversampling/focal by default).
# - Enable calibration (temperature) for better Brier/ECE reporting.
# - If you later find 1–2 assays are still weak, add *targeted* overrides for those assays only.

__hybrid__:
  encoder_lr: 1e-5
  head_lr: 3e-4
  layerwise_decay: 0.8

NR-AR:
  pos_weight: 8 #override default 22.511326860841425, takes precdence over dynamic_pos_weight
  dynamic_pos_weight: false
  oversample_minority: false
  use_focal_loss: true # override default false
  focal_gamma: 1.5 # default 2.0
  calibrate_probabilities: true
  calibration_method: temperature
  threshold_metric: pr_auc #override default roc_auc

