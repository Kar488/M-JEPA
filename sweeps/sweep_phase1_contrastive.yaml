program: scripts/train_jepa.py
command: ["${interpreter}", "${program}", "sweep-run", "${args}"]

# Randomness is coordinated by CI; a top-level `seed` may be injected dynamically.
method: random
metric: {name: val_rmse, goal: minimize}
early_terminate: {type: hyperband, min_iter: 3}

parameters:
  labeled_dir:   {value: "${env:APP_DIR}/data/katielinkmoleculenet_benchmark/train"}
  unlabeled_dir: {value: "${env:APP_DIR}/data/ZINC-canonicalized"}
  cache-datasets: {value: 1}
  cache-dir:      {value: "${env:SWEEP_CACHE_DIR}"}

  training_method: {value: contrastive}

  # contrastive-only knobs
  temperature:          {values: [0.05, 0.1]}
  
  #shared parameters with JEPA
  hidden_dim:           {value: 256}
  num_layers:           {value: 3}

  # Keep budgets aligned with the paired-effect filter thresholds (see run-grid-or-phase1.sh).
  pretrain_epochs:      {values: [5]}
  finetune_epochs:      {values: [1]}
  learning_rate:        {value: 1e-4}
  
  add_3d:               {value: 1}
   # masks a connectivity-respecting subgraph (functional group/ring/chain)
  contiguity:           {value: 1}
  aug_rotate:           {value: 1}
  aug_mask_angle:       {value: 1}
  aug_dihedral:         {value: 1}
  aug_bond_deletion:    {value: 1}
  aug_atom_masking:     {value: 1}
  aug_subgraph_removal: {value: 1}

  pretrain_batch_size:  {values: [64, 128, 256]}
  finetune_batch_size:  {values: [256] }
  
  max_pretrain_batches:  {values: [400, 800]}
  max_finetune_batches:  {value: 200}
  
  devices:              {value: 1}
  num-workers:          {value: 4}
  persistent-workers:   {value: 0} # 0 false
  prefetch-factor:      {value: 2}
  pin-memory:           {value: 0} # 0 false
  bf16:                 {value: 1} #1 true

  seed:                 {values: [1, 2, 3, 4, 5]}

  task_type:            {value: regression}
  label_col:            {value: "measured log solubility in mols per litre"}
  sample_unlabeled:     {value: 50000}
  sample_labeled:       {value: 5000}

  gnn_type:             {values: ["gine", "dmpnn", "schnet3d"]}