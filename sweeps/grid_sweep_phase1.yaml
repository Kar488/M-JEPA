program: scripts/train_jepa.py
command:
  - ${env}
  - python
  - ${program}
  - sweep-run

method: random
metric:
  name: val_loss
  goal: minimize

parameters:
  # dataset + task config
  unlabeled_dir:
    value: ${APP_DIR}/data/ZINC-canonicalized
  labeled_dir:
    value: ${APP_DIR}/data/katielinkmoleculenet_benchmark/train
  label_col:
    value: "measured log solubility in mols per litre"
  task_type:
    value: regression

  gnn_type:
    values: [gcn, gat, mpnn]
  training_method:
    values: [jepa, contrastive]
  mask_ratio:
    values: [0.15, 0.3, 0.5]
  contiguity:
    values: [0, 1]
  hidden_dim:
    value: 256
  num_layers:
    value: 3
  ema_decay:
    values: [0.996, 0.998, 0.999]
  add_3d:
    value: 1
  pretrain_batch_size:
    values: [64, 128, 256]
  finetune_batch_size:
    value: 256
  temperature:
    values: [0.07, 0.1, 0.2]
  pretrain_epochs:
    value: 30
  finetune_epochs:
    value: 1
  learning_rate:
    values: [0.0003, 0.0001]
  seed:
    values: [1, 2, 3]
  sample_unlabeled: 
    value: 10000
  sample_labeled: 
    value: 1000

early_terminate:
  type: hyperband
  min_iter: 10
