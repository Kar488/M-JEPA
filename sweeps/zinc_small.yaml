unlabeled_dir: "data/ZINC_canonicalized"
smiles_col: "smiles"
cache_dir: "${CACHE_DIR}/zinc"
prefix_filter: "train"
device: "cuda"
task_type: "classification"

seeds: [42, 123, 456]
methods: ["jepa", "contrastive", "molclr"]

mask_ratios: [0.10, 0.15]
contiguities: [false, true]
hidden_dims: [128, 256]
num_layers_list: [2, 3]
gnn_types: ["mpnn", "gcn", "edge_mpnn"]
ema_decays: [0.95, 0.99]
add_3d_options: [false, true]
aug_rotate_options: [false, true]
aug_mask_angle_options: [false]
aug_dihedral_options: [false]


pretrain_batch_sizes: [256]
finetune_batch_sizes: [64]
pretrain_epochs_options: [50]
finetune_epochs_options: [30]
lrs: [0.0001]
n_jobs: 0
output_csv: "outputs/grid_results.csv"

baseline_unlabeled_file: "data/zinc_pubchem_train.csv"
baseline_eval_file: "data/esol_eval.csv"
baseline_smiles_col: "smiles"
baseline_label_col: "ESOL"
baseline_cfg: "adapters/config.yaml"
