[pytest]
addopts = -ra -s -v -o log_cli=true --cov=. --cov-fail-under=70 --cov-report=term-missing
testpaths = tests
norecursedirs = third_party .git .github .venv venv build dist
filterwarnings =
    ignore::Warning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: requires CUDA/GPU (deselect with '-m "not gpu"')
